        setPrecompute(d.precompute || null);
        setDirty(false);
        const pc = d.precompute ? " · ⚡ precomputed" : "";
        setStatus(`Loaded ${d.id} (${d.edus.length} EDU, ${d.gold.length} gold)${pc}`);
      })
      .catch(e => setStatus("ERR " + e.message));
  }, [dataset, split, idx, dialogues.length]);

  // Per-USER cache isolation: clear the arc-scoped explanation/score caches whenever the
  // logged-in participant changes (login / logout / switch), so one user never sees another
  // user's cached explanations or scores in a shared browser.
  React.useEffect(() => {
    explCacheRef.current = {}; relCacheRef.current = {};
    setExplainedKeys(new Set()); setExplainingKey(null); setLinkScores({}); setRelScores(null);
    setLinkExpl(null); setRelExpl(null); setComboExpl(null);
  }, [participant]);

  // Multimodal: when a node is selected, play its clip. If the EDU has its OWN
  // segment file (clip_src), the per-EDU <EduClip> player handles it (video+audio) —
  // pause the dialogue-level player to avoid double audio. Otherwise seek the
  // dialogue player to the EDU's [start,end] offset in the concatenated media.
  useEffect(() => {
    const m = mediaRef.current;
    if (!m || selTarget == null || !dial?.media) return;
    if (dial.edus?.[selTarget]?.clip_src) { try { m.pause(); } catch (e) {} return; }
    const clip = dial.edus?.[selTarget]?.clip;
    if (!clip || clip[0] == null) return;
    try { m.currentTime = Number(clip[0]) || 0; m.play().catch(() => {}); } catch (e) {}
  }, [selTarget, dial]);

  const save = useCallback(async () => {
    if (!dial) return;
    setBusy("save");
    try {
      await api("/api/annotation", {
        method:"POST", headers:{"Content-Type":"application/json"},
        // NOTE: positions are NOT saved — they encode the current horizontal/vertical
        // layout; persisting them would pin a stale orientation and break the view on
        // reload. The dialogue is always re-laid-out per the CURRENT orientation setting.
        body: JSON.stringify({ dataset, split, idx: dial.idx,
          annotation: { arcs, threads, notes: dial.annotation?.notes || "" } }),
      });
      setDirty(false); setStatus("Saved.");
      setDialogues(ds => ds.map(d => d.idx === dial.idx ? {...d, annotated:true} : d));
    } catch (e) { setStatus("ERR " + e.message); }
    finally { setBusy(null); }
  }, [dial, dataset, split, arcs, threads, positions]);

  // Always-fresh ref so the dialogue-load effect can call save() without stale closure.
  const saveRef = useRef(save);
  useEffect(() => { saveRef.current = save; }, [save]);

  // Autosave: debounce 800 ms after any arc/thread mutation so a reload never loses work.
  const autosaveTimerRef = useRef(null);
  useEffect(() => {
    if (!dirty || !dial || !participant) return;
    clearTimeout(autosaveTimerRef.current);
    autosaveTimerRef.current = setTimeout(() => { save(); }, 800);
    return () => clearTimeout(autosaveTimerRef.current);
  }, [dirty, arcs, threads, dial, participant]);

  // Export the current annotation (json / stac / glozz) and trigger a download.
  const exportAnn = useCallback(async (fmt) => {
    if (!dial) return;
    setBusy("export");
    try {
      const r = await api("/api/export", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ dataset, split, idx: dial.idx, arcs, format: fmt }),
      });
      const blob = new Blob([r.content], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = r.filename || `export.${fmt}`;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
      setStatus(`Exported ${fmt}.`);
    } catch (e) { setStatus("ERR " + e.message); }
    finally { setBusy(null); }
  }, [dial, dataset, split, arcs]);

  // Draggable overlays (suggestion chips + the on-arc relation picker). Grab anywhere
  // except an interactive control; offset is kept per element id so it stays put.
  const onPanelDown = (id, e) => {
    if (e.target.closest("button,select,input,a,svg,.arp-sc")) return;   // let controls / relation rows work
    e.stopPropagation();
    const o = panelOff[id] || { dx: 0, dy: 0 };
    panelDragRef.current = { id, sx: e.clientX, sy: e.clientY, odx: o.dx, ody: o.dy, moved: false };
  };
  useEffect(() => {
    const move = e => {
      const d = panelDragRef.current; if (!d) return;
      d.moved = true;
      setPanelOff(s => ({ ...s, [d.id]: { dx: d.odx + (e.clientX - d.sx), dy: d.ody + (e.clientY - d.sy) } }));
    };
    const up = () => { panelDragRef.current = null; };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
    return () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); };
  }, []);
  // mark "needs centering" on dialogue / orientation change (positions arrive async)
  useEffect(() => { centerPendingRef.current = true; }, [dial?.idx, dataset, orientation]);
  // After positions are set, scroll the canvas so the node bounding box lands in the
  // centre of the visible viewport.
  useEffect(() => {
    if (!dial || !centerPendingRef.current) return;   // only after load/relayout, never on drag
    const wrap = document.querySelector(".canvas-wrap");
    if (!wrap || !positions[0]) return;
    centerPendingRef.current = false;
    // Centre the node bounding box in the ACTUAL visible viewport (measured in CSS px,
    // so it's correct at any Chrome zoom) on BOTH axes; if the box is larger than the
    // view on an axis, align that axis to the start (margin) so EDU 0 stays visible.
    // Multiply by the in-app zoom (CSS `zoom` scales the scroll coordinate space).
    const ps = Object.values(positions);
    if (!ps.length) return;
    const z = zoom || 1;
    const minX = Math.min(...ps.map(p => p.x)), maxX = Math.max(...ps.map(p => p.x)) + NODE_W;
    const minY = Math.min(...ps.map(p => p.y)), maxY = Math.max(...ps.map(p => p.y)) + NODE_H;
    const vw = wrap.clientWidth, vh = wrap.clientHeight;
    const cW = (maxX - minX) * z, cH = (maxY - minY) * z;
    // pan (translate) is the negative of where scroll would have been
    const px = cW <= vw ? (vw / 2 - ((minX + maxX) / 2) * z) : (40 - minX * z);
    const py = cH <= vh ? (vh / 2 - ((minY + maxY) / 2) * z) : (40 - minY * z);
    setPan({ x: px, y: py });
  }, [dial?.idx, positions]);

  // Measure actual node sizes after render; used for precise arc/label anchoring.
  React.useLayoutEffect(() => {
    const edusLen = dial?.edus?.length || 0;
    if (!edusLen) return;
    const newSizes = {};
    let changed = false;
    for (let i = 0; i < edusLen; i++) {
      const el = nodeRefs.current[i];
      if (el) {
        const w = el.offsetWidth, h = el.offsetHeight;
        newSizes[i] = { w, h };
        const prev = sizes[i];
        if (!prev || prev.w !== w || prev.h !== h) changed = true;
      }
    }
    if (changed) setSizes(newSizes);
  });

  // Keyboard: escape clears selection
  useEffect(() => {
    const h = e => {
      if (e.key === "Escape") { setSelTarget(null); setArcSrc(null); setSelArc(null); setSuggestions(null); setNodeMenu(null); setParserSug(null); setHoverPred(null); }
      else if (e.key === "Delete" && selArc) { delArc(selArc[0], selArc[1]); setSelArc(null); }
      else if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); save(); }
      else if ((e.ctrlKey || e.metaKey) && e.key === "z") { e.preventDefault(); undo(); }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  });

  const edus = dial?.edus || [];
  const speakers = useMemo(() => edus.map(e => e.speaker), [edus]);
  const texts = useMemo(() => edus.map(e => e.text), [edus]);
  const spkColor = useMemo(() => {
    const m = {};
    [...new Set(speakers)].forEach((s, i) => { m[s] = SPK_COLORS[i % SPK_COLORS.length]; });
    return m;
  }, [speakers]);
  const threadOf = useMemo(() => {
    const m = {};
    threads.forEach((t, ti) => (t.members || []).forEach(x => { m[x] = ti; }));
    return m;
  }, [threads]);
  // Render a Claude EGM explanation string with graphics: [i] index → speaker-coloured
  // chip; [i]<…> quoted span → tinted quote bubble; 'Relation' → coloured relation tag.
  const renderExpl = (text) => {
    if (!text) return "—";
    // Soften the "block" look:
    //  • EGM arrow notation –> / -> becomes a real arrow →
    //  • the arc is always REORDERED low→high ([1] → [0] becomes [0] → [1]) to match how
    //    arcs are shown everywhere
    //  • a line break after the leading "[lo]→[hi]:'rel':" header.
    text = String(text).replace(/\s*[–-]>\s*/g, " → ")
      .replace(/\[(\d+)\]\s*→\s*\[(\d+)\]/g, (mm, a, bb) =>
        `[${Math.min(+a, +bb)}] → [${Math.max(+a, +bb)}]`)
      .replace(/(:\s*'[^']+'\s*:)\s*/, "$1\n");
    const out = []; let key = 0;
    // Colour any SPEAKER NAME appearing in a plain-text segment with its speaker colour.
    const spk = [...new Set((speakers || []).filter(Boolean))].sort((a, b) => b.length - a.length);
    const esc = s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const spkRe = spk.length ? new RegExp(`\\b(${spk.map(esc).join("|")})\\b`, "g") : null;
    const pushText = (seg) => {
      if (!seg) return;
      if (!spkRe) { out.push(seg); return; }
      let li = 0, mm;
      while ((mm = spkRe.exec(seg)) !== null) {
        if (mm.index > li) out.push(seg.slice(li, mm.index));
        out.push(<b key={key++} className="ex-spk" style={{color: spkColor[mm[1]] || "var(--fg-0)", fontWeight:700}}>{mm[1]}</b>);
        li = spkRe.lastIndex;
      }
      if (li < seg.length) out.push(seg.slice(li));
    };
    // Style [i] index refs and their quoted utterance. The quote may be written
    // [i]<…>, [i]'…', OR [i]Speaker:'…' (the LINK explanation prefixes the speaker name
    // and a colon) — we absorb an optional "Speaker:" between the index and the quote.
    // The quote group is REQUIRED inside the optional block so a bare [i] never eats the
    // following space/word.
    // Quotes are recognised ONLY as [i]<verbatim …> (angle brackets never occur in real
    // text). We deliberately do NOT parse [i]'…' — apostrophes appear in possessives
    // ("[3]'s") and contractions and would break the bubble parsing.
    const re = /\[(\d+)\](?:\s*(?:[A-Za-z][\w.\-]*\s*:\s*)?(<[^>]*>))?/g;
    let last = 0, m, lastWasQuote = false;
    // When a quoted utterance moves onto its own block line, orphaned punctuation around
    // it is dropped: leading . , : ; ! ? — – and a closing ) after the bubble; a dangling
    // opening ( or — right before the bubble.
    const stripLead  = s => s.replace(/^\s*[)\]}'"“”.,:;!?–—-]+\s*/, "");
    const stripBefore = s => s.replace(/\s*[([{–—-]+\s*$/, " ");
    while ((m = re.exec(text)) !== null) {
      const idx = +m[1], col = spkColor[edus[idx]?.speaker] || "var(--fg-0)";
      const quote = m[2] !== undefined ? m[2].replace(/^[<'"]|[>'"]$/g, "") : undefined;
      let seg = text.slice(last, m.index);
      // EXCEPTION: a quote INSIDE parentheses (open "(" not yet closed before it) stays
      // INLINE — no line break — so the parenthetical aside reads naturally.
      const inParen = quote !== undefined && /\([^)]*$/.test(seg);
      if (lastWasQuote) seg = stripLead(seg);                 // orphan punctuation after a block bubble
      if (quote !== undefined && !inParen) seg = stripBefore(seg);  // dangling "(" / "—" before a block bubble
      pushText(seg);
      if (quote !== undefined && inParen) {
        // inline quote (within parentheses)
        out.push(<b key={key++} className="ex-idx" style={{color: col}}>[{idx}]</b>);
        out.push(" ");
        out.push(<span key={key++} className="ex-quote" style={{borderColor: col}}>{quote.replace(/^['"]|['"]$/g, "")}</span>);
        lastWasQuote = false;   // keep the following ")" inline (don't strip it)
      } else if (quote !== undefined) {
        // a QUOTED utterance gets its OWN centred block line with generous spacing
        out.push(
          <div key={key++} className="ex-qline">
            <b className="ex-idx" style={{color: col}}>[{idx}]</b>{" "}
            <span className="ex-quote" style={{borderColor: col}}>{quote.replace(/^['"]|['"]$/g, "")}</span>
          </div>
        );
        lastWasQuote = true;
      } else {
        out.push(<b key={key++} className="ex-idx" style={{color: col}}>[{idx}]</b>);
        lastWasQuote = false;
      }
      last = re.lastIndex;
    }
    let segF = text.slice(last);
    if (lastWasQuote) segF = stripLead(segF);
    pushText(segF);
    return out;
  };

  // The DAG CHILD (the attached unit) is always the LATER EDU = max(x,y); the parent
  // is min(x,y). Stored arcs keep their original SDRT direction (some relations point
  // backward, e.g. Explanation), so derive child/parent by index here — never assume a.y.
  const parentsOf = useMemo(() => {
    const m = {};
    arcs.forEach(a => { const c = Math.max(a.x, a.y), pp = Math.min(a.x, a.y); (m[c] = m[c] || []).push(pp); });
    return m;
  }, [arcs]);

  const goldSet = useMemo(() => new Set((dial?.gold || []).map(g => `${Math.min(g.x,g.y)},${Math.max(g.x,g.y)}`)), [dial]);
  const annSet = useMemo(() => new Set(arcs.map(a => `${Math.min(a.x,a.y)},${Math.max(a.x,a.y)}`)), [arcs]);
  // BLIND incremental: while walking, the annotator must not see the upcoming
  // utterances nor the gold (it would bias the annotation / the user study).
  // Only EDUs <= t are shown and gold is hidden, unless 'reveal gold' is on.
  const blind = !!incr && !revealGold;
  const visibleMax = blind ? incr.t : ((dial?.edus?.length || 0) - 1);
  // gold is hidden by default and NEVER shown to participants — only an experimenter can
  // reveal it (eval). This holds at startup and throughout, regardless of any other state.
  const showGold = revealGold && isExperimenter;
  // Automatic incremental frontier: the first EDU (≥1) that still has NO parent.
  // With gating on (default), EDUs AFTER it are grayed-out / locked until the
  // earlier ones get a parent. EDU 0 is the root and never needs a parent.
  const frontier = useMemo(() => {
    const n = dial?.edus?.length || 0;
    const parented = new Set(arcs.map(a => Math.max(a.x, a.y)));   // child = later EDU
    for (let i = 1; i < n; i++) if (!parented.has(i)) return i;
    return n;  // all parented → no gating
  }, [arcs, dial]);
  // Window resize → recompute the DOM-anchored overlay arrow (list-row rects move).
  React.useEffect(() => {
    const f = () => setDomTick(v => (v + 1) & 0xffff);
    window.addEventListener("resize", f);
    return () => window.removeEventListener("resize", f);
  }, []);
  const arcTracks = useMemo(() => computeArcTracks(arcs), [arcs]);
  const labelTs = useMemo(() => computeLabelTs(arcs), [arcs]);
  // Fan distribution: per-arc rank among siblings sharing its source (out) or
  // target (in), ordered by the other endpoint's x → spread anchors, no overlap.
  const fanInfo = useMemo(() => {
    // Arrows always run forward (lo = earlier = source/parent, hi = later =
    // target/child), regardless of how the relation is stored, so a (6,5)
    // backward edge still exits the earlier node and enters the later one.
    const out = {}, inc = {}, info = {};
    const lo = a => Math.min(a.x, a.y), hi = a => Math.max(a.x, a.y);
    for (const a of arcs) {
      (out[lo(a)] = out[lo(a)] || []).push(a);
      (inc[hi(a)] = inc[hi(a)] || []).push(a);
    }
    const cx = i => (positions[i]?.x ?? 0) + ((sizes[i]?.w || NODE_W) / 2);
    for (const s in out) {
      out[s].slice().sort((p, q) => cx(hi(p)) - cx(hi(q))).forEach((a, i, arr) => {
        const k = `${a.x},${a.y}`;
        info[k] = { ...(info[k] || {}), outIdx: i, outN: arr.length };
      });
    }
    for (const t in inc) {
      inc[t].slice().sort((p, q) => cx(lo(p)) - cx(lo(q))).forEach((a, i, arr) => {
        const k = `${a.x},${a.y}`;
        info[k] = { ...(info[k] || {}), inIdx: i, inN: arr.length };
      });
    }
    return info;
  }, [arcs, positions, sizes]);

  // Geometric, deterministic arc-overlap resolution. Arcs are grouped by their
  // horizontal DIRECTION (does the curve head right or left?), then interval-
  // coloured WITHIN each group so overlapping same-direction arcs get increasing
  // nesting depth. The lateral offset is direction × (base + depth·step): arcs
  // heading right bow right (nested), arcs heading left bow left — never random.
  const arcBow = useMemo(() => {
    // bow is applied on the PERPENDICULAR axis: x for top→bottom, y for left→right.
    const horiz = orient === "LR";
    const coord = i => horiz
      ? (positions[i]?.y ?? 0) + ((sizes[i]?.h || NODE_H) / 2)
      : (positions[i]?.x ?? 0) + ((sizes[i]?.w || NODE_W) / 2);
    // LEFT→RIGHT: nest ALL arcs by span, then ALTERNATE sides by nesting depth so
    // overlapping arcs (e.g. a fan-out) spread UP *and* DOWN instead of all curving
    // to the same side. Magnitude is small + scaled to the (smaller) thread spacing.
    if (horiz) {
      // 2-page crossing-minimising routing (shared with the node layout). Pass live
      // node y-coords so the side choice is position-aware (prefer DOWN; UP if a spanned
      // node sits below) and recomputes whenever an EDU moves.
      const sides = computeArcSides(arcs, coord), info = {};
      // Empirical rule: arcs spanning MORE EDUs sit FARTHER from the axis (span term),
      // on top of the nesting-depth separation → long arcs clear the short ones. Generous
      // magnitude so arcs have room to breathe (wider curves).
      for (const k in sides) { const [kx, ky] = k.split(",").map(Number); const span = Math.abs(ky - kx);
        info[k] = sides[k].side * (52 + sides[k].depth * 50 + Math.min(span - 1, 14) * 8); }
      return info;
    }
    // VERTICAL (top→bottom): same crossing-minimising + position-aware side choice as the
    // horizontal case (so the bow follows the EDU's position relative to the axis), but with
    // a LARGER magnitude → wider, cleaner curves in the vertical view.
    const sides = computeArcSides(arcs, coord), info = {};
    for (const k in sides) { const [kx, ky] = k.split(",").map(Number); const span = Math.abs(ky - kx);
      info[k] = sides[k].side * (55 + sides[k].depth * 52 + Math.min(span - 1, 14) * 8); }
    return info;
  }, [arcs, positions, sizes, orient]);
  // Auto-routed bow, with any per-arc manual drag override layered on top.
  const arcBowEff = useMemo(() => ({ ...arcBow, ...arcBowOverride }), [arcBow, arcBowOverride]);

  // Relation-label placement with COLLISION RESOLUTION: place each label at its
  // point on the arc, then iteratively push apart any labels whose boxes overlap
  // (along the smaller-overlap axis) so labels never sit on top of each other.
  const labelPositions = useMemo(() => {
    const pts = {}; const keys = [];
    for (const a of arcs) {
      const lo = Math.min(a.x, a.y), hi = Math.max(a.x, a.y);
      const ps = positions[lo], pt = positions[hi];
      if (!ps || !pt) continue;
      const key = `${a.x},${a.y}`;
      const g = arcGeomSmart(ps, pt, sizes[lo], sizes[hi], lo, hi, positions, sizes,
        edus.length, { bow: arcBowEff[key] || 0 }, orient);
      const lt = labelTs[key] ?? 0.5;
      const p = g.pts ? bezierAt(g.pts, lt) : g.mid;
      pts[key] = { x: p.x, y: p.y, w: (relFull(a.type || "").length) * 8.8 + 14, h: 22 };
      keys.push(key);
    }
    for (let iter = 0; iter < 40; iter++) {
      let moved = false;
      for (let i = 0; i < keys.length; i++) for (let j = i + 1; j < keys.length; j++) {
        const a = pts[keys[i]], b = pts[keys[j]];
        const ox = (a.w + b.w) / 2 - Math.abs(b.x - a.x);
        const oy = (a.h + b.h) / 2 - Math.abs(b.y - a.y);
        if (ox > 0 && oy > 0) {
          if (oy <= ox) { const s = (oy / 2 + 0.5) * (b.y >= a.y ? 1 : -1); a.y -= s; b.y += s; }
          else          { const s = (ox / 2 + 0.5) * (b.x >= a.x ? 1 : -1); a.x -= s; b.x += s; }
          moved = true;
        }
      }
      if (!moved) break;
    }
    return pts;
  }, [arcs, positions, sizes, arcBowEff, labelTs, orient]);
  // Canvas grows to fit the layout (+ margin) so nothing falls outside / becomes
  // unscrollable, even for long dialogues with wide thread spreads.
  const canvasSize = useMemo(() => {
    let w = 1200, h = 800;
    for (const k in positions) {
      const p = positions[k]; if (!p) continue;
      const sz = sizes[k] || { w: NODE_W, h: NODE_H };
      w = Math.max(w, p.x + sz.w + 160);
      h = Math.max(h, p.y + sz.h + 160);
    }
    return { w, h };
  }, [positions, sizes]);
  // Bounding box of the utterances (canvas coords) — drives the custom scrollbars.
  const contentBox = useMemo(() => {
    let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
    for (const k in positions) {
      const p = positions[k]; if (!p) continue;
      const sz = sizes[k] || { w: NODE_W, h: NODE_H };
      x0 = Math.min(x0, p.x); y0 = Math.min(y0, p.y);
      x1 = Math.max(x1, p.x + sz.w); y1 = Math.max(y1, p.y + sz.h);
    }
    if (!isFinite(x0)) return null;
    return { x0, y0, x1, y1 };
  }, [positions, sizes]);
  const goldTracks = useMemo(() => {
    const missing = (dial?.gold || [])
      .filter(g => !annSet.has(`${Math.min(g.x,g.y)},${Math.max(g.x,g.y)}`))
      .map(g => ({x: g.x, y: g.y}));
    return computeArcTracks(missing);
  }, [dial, annSet]);

  const metrics = useMemo(() => {
    const tp = [...annSet].filter(k => goldSet.has(k)).length;
    const fp = annSet.size - tp;
    const fn = goldSet.size - tp;
    const p = tp + fp ? tp / (tp + fp) : 0;
    const r = tp + fn ? tp / (tp + fn) : 0;
    const f1 = p + r ? 2 * p * r / (p + r) : 0;
    return { tp, fp, fn, p, r, f1 };
  }, [annSet, goldSet]);

  // C5 helpers ───────────────────────────────────────────────────────────────
  // forward-reachable nodes from N (downstream-through-N), excluding N itself.
  const downstreamOf = (N, arcList) => {
    const adj = {};
    arcList.forEach(a => { (adj[a.x] = adj[a.x] || []).push(a.y); });
    const seen = new Set(), stack = [N];
    while (stack.length) {
      const u = stack.pop();
      (adj[u] || []).forEach(v => { if (!seen.has(v)) { seen.add(v); stack.push(v); } });
    }
    return seen;
  };
  // snapshot before a mutation so undo can revert the decision AND its flags.
  const pushUndo = () => {
    undoStackRef.current.push({ arcs: arcs.map(a => ({...a})), flagged: new Set(flagged) });
    if (undoStackRef.current.length > 50) undoStackRef.current.shift();
    setUndoDepth(undoStackRef.current.length);
  };
  // after editing node y's incoming link/relation: flag everything downstream of y.
  const cascadeFrom = (y, nextArcs) => {
    const ds = downstreamOf(y, nextArcs);
    if (ds.size) setFlagged(f => { const n = new Set(f); ds.forEach(v => n.add(v)); return n; });
  };
  const undo = () => {
    const snap = undoStackRef.current.pop();
    if (!snap) return;
    setUndoDepth(undoStackRef.current.length);
    setArcs(snap.arcs); setFlagged(snap.flagged); setDirty(true);
    setStatus("↶ undo"); logEvent("undo", {});
  };
  const reconfirm = (n, log=false) => { if (log) logEvent("reconfirm", {node:n}); setFlagged(f => { const s = new Set(f); s.delete(n); return s; }); };
  const reconfirmAll = () => { logEvent("reconfirm", {node:"all"}); setFlagged(new Set()); setStatus("✓ all re-confirmed"); };
  const nextToConfirm = () => {
    const next = [...flagged].sort((a, b) => a - b)[0];
    if (next == null) return;
    setSelTarget(next);
    const el = nodeRefs.current[next];
    if (el) el.scrollIntoView({ block: "center", inline: "center", behavior: "smooth" });
  };

  // `origin` records who chose the RELATION label: "user" (picker) or "parser"
  // (accepted suggestion) — the explanation engine is told, so it can warn
  // itself about parser error patterns when the label is machine-proposed.
  const addArc = (x, y, type="", score=0, origin="") => {
    if (x === y) return;
    // Right-frontier / forward convention: an arc always goes from the
    // LOWER-index EDU (source, arrow out) to the HIGHER-index EDU (target, arrow in).
    const lo = Math.min(x, y), hi = Math.max(x, y);
    x = lo; y = hi;
    const key = `${x},${y}`;
    if (annSet.has(key)) return;
    pushUndo();
    const next = [...arcs, { x, y, type, score, ...(type ? { origin: origin || "user" } : {}) }]
      .sort((a,b) => a.y - b.y || a.x - b.x);
    setArcs(next); setDirty(true);
    reconfirm(y); cascadeFrom(y, next);   // y just (re)decided → clear its own flag, flag downstream
    if (layoutKind === "incr") relayoutIncr(next);   // reflow nodes to avoid arc/box overlap
    prefetchRelScores(x, y);              // async: precompute DDPE relation scores for this new arc
    logEvent("link_add", { x, y, type: type || "" });
  };
  const delArc = (x, y) => {
    pushUndo();
    const next = arcs.filter(r => !(r.x === x && r.y === y));
    setArcs(next); setDirty(true);
    cascadeFrom(y, next);
    if (layoutKind === "incr") relayoutIncr(next);
    logEvent("link_remove", { x, y });
  };
  const setLabel = (x, y, type) => {
    const prev = arcs.find(r => r.x === x && r.y === y)?.type || "";
    pushUndo();
    // a manual (re)label is always a human decision, whatever set it before
    const next = arcs.map(r => (r.x === x && r.y === y) ? {...r, type, origin: "user"} : r);
    setArcs(next); setDirty(true);
    reconfirm(y); cascadeFrom(y, next);
    logEvent(prev ? "relation_change" : "relation_set", { x, y, from: prev, to: type });
  };

  // ── Drag/click handling ──
  const onNodeMouseDown = (e, i) => {
    if (e.button !== 0) return;
    e.stopPropagation();
    const pos = positions[i] || {x:0, y:0};
    setDrag({ idx:i, startX:e.clientX, startY:e.clientY,
              origX:pos.x, origY:pos.y, moved:false,
              mod:(e.ctrlKey || e.metaKey), alt:e.altKey });   // Ctrl (Win/Linux) / Cmd (Mac) = quick-connect
  };
  const onCanvasMouseMove = e => {
    if (drag) {
      const dx = e.clientX - drag.startX, dy = e.clientY - drag.startY;
      if (!drag.moved && Math.hypot(dx, dy) < 4) return;
      if (!drag.moved) setDrag(d => ({...d, moved:true}));
      setPositions(p => ({...p, [drag.idx]: { x: drag.origX + dx, y: drag.origY + dy }}));
      if (!drag.mod) setDirty(true);
      return;
    }
    if (rawMode || linkExpl || relExpl || comboExpl) return;
    // ARC HOVER: a generous zone centred on the LABEL/"?" that extends DOWNWARD to cover
    // the ✦/✕ buttons (which sit ~30px below the label), so moving from the label onto a
    // button never loses the hover. Plus a band along the curve for the rest of the arc.
    const wrap = canvasRef.current; if (!wrap) return;
    const rect = wrap.getBoundingClientRect();
    const z = zoom || 1;
    const cx = (e.clientX - rect.left + wrap.scrollLeft) / z, cy = (e.clientY - rect.top + wrap.scrollTop) / z;
    const LABEL_R = 150, CURVE_R = 120;   // big circle around the label; smaller band along the curve
    let best = null, bestScore = 1;        // score = distance / radius (so different radii compare fairly)
    for (const a of arcs) {
      const lo = Math.min(a.x, a.y), hi = Math.max(a.x, a.y);
      if (!positions[lo] || !positions[hi] || hi > visibleMax) continue;
      const kk = `${a.x},${a.y}`;
      const g = arcGeomSmart(positions[lo], positions[hi], sizes[lo], sizes[hi],
        lo, hi, positions, sizes, edus.length, { bow: arcBowEff[kk] || 0 }, orient);
      // 1) big circle around the label, biased downward to swallow the buttons row
      const lp = labelPositions[kk] || g.mid;
      const anchor = { x: lp.x, y: lp.y + 18 };   // shift the centre down toward the buttons
      let score = Math.hypot(cx - anchor.x, cy - anchor.y) / LABEL_R;
      // 2) band along the curve
      for (const t of [0.2, 0.4, 0.6, 0.8]) {
        const p = g.pts ? bezierAt(g.pts, t) : g.mid;
        score = Math.min(score, Math.hypot(cx - p.x, cy - p.y) / CURVE_R);
      }
      if (score < 1 && score < bestScore) { bestScore = score; best = [a.x, a.y]; }
    }
    if (best) { if (!hoverArc || hoverArc[0] !== best[0] || hoverArc[1] !== best[1]) setHover(best); }
    else if (hoverArc) clearHoverSoon();
  };
  const onCanvasMouseUp = e => {
    if (drag && !drag.moved) {
      const clicked = drag.idx;
      const isPred = selTarget != null && clicked < selTarget && !annSet.has(`${clicked},${selTarget}`);
      if (drag.mod && selTarget != null && selTarget !== clicked) {
        // Ctrl/Cmd-click a predecessor → connect immediately (shortcut)
        addArc(clicked, selTarget);
        setStatus(`Added arc (${Math.min(clicked, selTarget)}→${Math.max(clicked, selTarget)})`);
      } else if (arcSrc != null && arcSrc !== clicked) {
        addArc(arcSrc, clicked); setArcSrc(null);
      } else if (isPred) {
        // click a predecessor of the selected EDU → options panel with "connect"
        setNodeMenu({ kind: "connect", src: clicked, tgt: selTarget }); setSelArc(null);
      } else {
        // otherwise this node becomes the EDU under analysis (lightbulb appears on it)
        setSelTarget(clicked); setSelArc(null); setParserSug(null);
        setNodeMenu(null);
      }
    }
    setDrag(null);
  };
  // Drag an arc's mid badge (the "?" or the relation label) PERPENDICULAR to its chord
  // to widen / reshape the arc. Writes a per-arc bow override; a plain click (no move)
  // still just selects the arc. Discreet `grab` cursor — no toolbar, no handle shown.
  const startBowDrag = (e, ax, ay) => {
    if (e.button !== 0) return;
    e.stopPropagation(); e.preventDefault();
    const lo = Math.min(ax, ay), hi = Math.max(ax, ay);
    const ps = positions[lo], pt = positions[hi];
    if (!ps || !pt) return;
    const horiz = orient === "LR";
    const sw = sizes[lo]?.w || NODE_W, sh = sizes[lo]?.h || NODE_H;
    const tw = sizes[hi]?.w || NODE_W, th = sizes[hi]?.h || NODE_H;
    const sx = horiz ? ps.x + sw : ps.x + sw / 2, sy = horiz ? ps.y + sh / 2 : ps.y + sh;
    const tx = horiz ? pt.x : pt.x + tw / 2,       ty = horiz ? pt.y + th / 2 : pt.y;
    const dx = tx - sx, dy = ty - sy, L = Math.hypot(dx, dy) || 1;
    const nx = -dy / L, ny = dx / L;               // unit perpendicular to the chord
    const mx = (sx + tx) / 2, my = (sy + ty) / 2;  // chord midpoint = bow origin
    bowDragRef.current = { moved: false };
    const move = ev => {
      const wrap = canvasRef.current; if (!wrap) return;
      const rect = wrap.getBoundingClientRect(), z = zoom || 1;
      const cx = (ev.clientX - rect.left + wrap.scrollLeft) / z;
      const cy = (ev.clientY - rect.top + wrap.scrollTop) / z;
      const off = (cx - mx) * nx + (cy - my) * ny;  // project drag onto the perpendicular
      bowDragRef.current.moved = true;
      setArcBowOverride(o => ({ ...o, [`${ax},${ay}`]: off }));
    };
    const up = () => {
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
      const d = bowDragRef.current; bowDragRef.current = null;
      if (d && !d.moved) { setSelArc([ax, ay]); setSelTarget(ay); setNodeMenu(null); }
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  };
  // Hover a predecessor (canvas or dialogue list) → dashed preview arc in canvas.
  // dashed preview while connecting — show for ANY other utterance (forward or backward),
  // for visual consistency, as long as it isn't already linked to the target.
  const onPredHover = i => { if (selTarget != null && i !== selTarget && !annSet.has(`${Math.min(i,selTarget)},${Math.max(i,selTarget)}`)) setHoverPred(i); };
  const onPredLeave = i => setHoverPred(h => (h === i ? null : h));
  const onCanvasClick = e => {
    // Click on empty canvas
    if (e.target === e.currentTarget || e.target.classList?.contains("canvas")) {
      setSelTarget(null); setArcSrc(null); setSelArc(null);
      setNodeMenu(null); setParserSug(null); setHoverPred(null);
    }
  };
  // Pan the (infinite) canvas: Ctrl/⌘ + drag on empty background. Ctrl/⌘ + click ON a node
  // still connects it — panning only starts on the background, never on a node/control.
  const startPan = e => {
    if (e.button !== 0 || !(e.ctrlKey || e.metaKey)) return;
    if (e.target.closest && e.target.closest(".node, .arc-rel-picker, button, .legend, .codebook, .xpl-callout, .prop-chip, .node-menu")) return;
    e.preventDefault();
    panRef.current = { sx: e.clientX, sy: e.clientY, ox: pan.x, oy: pan.y };
    const wrap = canvasWrapRef.current; if (wrap) wrap.classList.add("panning");
    const move = ev => {
      const p = panRef.current; if (!p) return;
      setPan({ x: p.ox + (ev.clientX - p.sx), y: p.oy + (ev.clientY - p.sy) });
    };
    const up = () => {
      panRef.current = null;
      window.removeEventListener("mousemove", move);
      window.removeEventListener("mouseup", up);
      if (wrap) wrap.classList.remove("panning");
    };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
  };
  // Custom scrollbars over the (infinite, pan-by-translate) canvas. The track length == the
  // viewport length; total == the utterance bbox padded by half a viewport on each side.
  const scrollRange = (axis, wrap) => {
    const z = zoom || 1;
    const view = axis === "h" ? wrap.clientWidth : wrap.clientHeight;     // viewport px
    const padC = view / z * 0.5;
    const c0 = (axis === "h" ? contentBox.x0 : contentBox.y0) - padC;
    const c1 = (axis === "h" ? contentBox.x1 : contentBox.y1) + padC;
    return { z, view, c0, total: (c1 - c0) || 1 };
  };
  const startScrollDrag = (axis, e) => {
    if (e.button !== 0) return;
    e.preventDefault(); e.stopPropagation();
    const wrap = canvasWrapRef.current; if (!wrap || !contentBox) return;
    const { z, view, total } = scrollRange(axis, wrap);
    const start = axis === "h" ? e.clientX : e.clientY;
    const base = axis === "h" ? pan.x : pan.y;
    const move = ev => {
      const d = (axis === "h" ? ev.clientX : ev.clientY) - start;         // px dragged on track
      const newPan = base - (d / view * total) * z;                       // pan opposes content shift
      setPan(p => axis === "h" ? { ...p, x: newPan } : { ...p, y: newPan });
    };
    const up = () => { window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); };
    window.addEventListener("mousemove", move); window.addEventListener("mouseup", up);
  };
  // Wheel / trackpad over the canvas: Ctrl/⌘ + wheel ZOOMS; a plain wheel / two-finger
  // trackpad scroll PANS (deltaX/deltaY → translate). Native non-passive listener so
  // preventDefault() blocks the browser's page zoom/scroll.
  useEffect(() => {
    const el = canvasWrapRef.current; if (!el) return;
    const onWheel = ev => {
      // If the event originates inside a docked panel (relation codebook or on-arc
      // picker), let the panel scroll naturally — do NOT pan the canvas.
      if (ev.target.closest && ev.target.closest(".arc-rel-picker, .codebook")) return;
      ev.preventDefault();
      if (ev.ctrlKey || ev.metaKey) {                  // zoom
        const factor = Math.exp(-ev.deltaY * 0.0015);
        setZoom(z => Math.max(0.4, Math.min(2, +(z * factor).toFixed(3))));
      } else {                                          // pan — damped so EDUs don't fly off-screen
        setPan(p => ({ x: p.x - ev.deltaX * 0.55, y: p.y - ev.deltaY * 0.55 }));
      }
    };
    el.addEventListener("wheel", onWheel, { passive: false });
    return () => el.removeEventListener("wheel", onWheel);
  }, [auth, config]);   // (re)attach once the canvas actually mounts (after the auth gate)
  // Manual bow overrides (px perpendicular offsets) are layout-specific → drop them when
  // the dialogue or the orientation changes, so stale offsets don't distort fresh arcs.
  useEffect(() => { setArcBowOverride({}); }, [dial, orientation]);

  // ── Demo / virtual-user bridge ── exposed so Playwright can drive the UI via JS ──
  useEffect(() => {
    window.__mudipa__ = { addArc, setLabel, delArc, setArcs, setSelArc, setSelTarget, setNodeMenu,
                         getArcs: () => arcs, getEdus: () => edus, getDial: () => dial };
  });

  // ── Suggestions ──
  const suggestParentRaw = async (target) => {
    if (target == null || target < 1) return;
    // Use precomputed cache if available
    const cached = precompute?.raw?.[String(target)];
    if (cached) {
      setSuggestions({ kind:"raw", target, parents: cached.parents || [], reason: cached.reason || "" });
      setStatus(`⚡ Parent(s) of (${target}): [${(cached.parents||[]).join(",")}]`);
      return;
    }
    setBusy("suggestRaw"); setStatus(`Raw: who is the parent of (${target})?`);
    try {
      const r = await api("/api/suggest/parent", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ edus: texts, speakers, target }),
      });
      setSuggestions({ kind:"raw", target, parents: r.parents || [], reason: r.reason || "" });
      setStatus(`Parent(s) of (${target}): [${(r.parents||[]).join(",")}]`);
    } catch (e) { setStatus("ERR " + e.message); }
    finally { setBusy(null); }
  };

  // ── Manual-first candidate parents. Whenever a node is the target (a selected
  // node, OR the incremental EDU), its possible parents in the window show as
  // dashed faint arcs. CLICK = add the arc (manual, zero LLM). ⓘ explain and ✨
  // score are OPT-IN aids. The LLM is never required to annotate.
  const candTarget = incr ? incr.t : (selTarget != null && selTarget >= 1 ? selTarget : null);
  const candCands = (() => {
    if (candTarget == null) return [];
    const t = candTarget, out = [];
    const committed = new Set(arcs.filter(a => a.y === t).map(a => a.x));
    for (let p = Math.max(0, t - 6); p < t; p++) {
      if (committed.has(p) || propRejected.has(p)) continue;
      // Only an EXPLICITLY-SHOWN explanation (explainedMap) drives the UI; the
      // cache is a speed layer behind explainCand. So the explanation panel/labels
      // appear only after the human asks (ⓘ) and it's generated.
      const raw = explainedMap[explainKey(p, t)] || null;
      out.push({ p, ex: raw, score: linkScores[`${p}>${t}`] });
    }
    return out;
  })();
  // reset per-target dismissals when the target changes
  React.useEffect(() => { setPropRejected(new Set()); }, [candTarget]);
  // S1 always_visible — auto-fetch explanations for the visible candidates.
  React.useEffect(() => {
    if (exposure !== "always_visible" || candTarget == null || rawMode) return;
    const t = candTarget;
    const committed = new Set(arcs.filter(a => a.y === t).map(a => a.x));
    for (let p = Math.max(0, t - 6); p < t; p++) {
      if (committed.has(p) || propRejected.has(p)) continue;
      const k = explainKey(p, t);
      if (!explainedMap[k] && !explainCacheRef.current.get(k)) explainCand(p);
    }
  }, [exposure, candTarget]);

  // Human ACTION: ADD the candidate arc (with its shown relation if explained).
  const acceptCand = (p) => {
    if (candTarget == null) return;
    const t = candTarget;
    const ex = explainedMap[explainKey(p, t)] || explainCacheRef.current.get(explainKey(p, t));
    const rel = ex?.relation?.candidate || "";
    addArc(p, t, rel, 0, "parser");   // machine-proposed label → origin "parser"
    logEvent("suggestion_accept", { x: p, y: t, relation: rel });
    setStatus(`added (${p})→(${t})${rel ? " ["+rel+"]" : ""}`);
  };
  const rejectCand = (p) => { logEvent("suggestion_reject", { x: p, y: candTarget }); setPropRejected(s => { const n = new Set(s); n.add(p); return n; }); };

  // OPT-IN aid: explain one candidate arc (LLM / DDPE). Cached per (p,t,context).
  // S2: disabled in raw (manual) mode — no LLM endpoint is hit.
  const explainCand = async (p) => {
    if (candTarget == null || rawMode) return;
    const t = candTarget, key = explainKey(p, t);
    logEvent("explain_requested", { x: p, y: t });
    const hit = explainCacheRef.current.get(key);
    if (hit) { setExplainedMap(m => ({ ...m, [key]: hit }));
               logEvent("explain_shown", { x: p, y: t });
               setStatus(`⚡ (${p})→(${t})`); return; }
    setLoadingCand(p); setStatus(`Explaining (${p})→(${t})… (${engine}, may be slow)`);
    try {
      const r = await api("/api/suggest/incremental", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ edus: texts, speakers, target: t, parents: [p],
                               arcs: arcs.filter(a => a.y < t), engine, dataset }),
      });
      const c = (r.candidates || []).find(z => z.parent === p) || (r.candidates || [])[0] || null;
      if (c) { explainCacheRef.current.set(key, c); setExplainedMap(m => ({ ...m, [key]: c }));
               logEvent("explain_shown", { x: p, y: t }); }
      setStatus(`Explained (${p})→(${t})`);
    } catch (e) { setStatus("ERR " + e.message); }
    finally { setLoadingCand(null); }
  };

  // OPT-IN aid (✨): score the candidate links for the current target (parser/LLM).
  // Stores a 0..1 score per arc → candidate arc opacity becomes proportional to it.
  const scoreLinks = async (t) => {
    if (t == null || t < 1 || rawMode) return;
    setBusy("scoreLinks"); setStatus(`✨ scoring possible links for (${t})…`);
    try {
      const r = await api("/api/suggest/arcs", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ edus: texts, speakers, target: t }),
      });
      setLinkScores(s => {
        const n = { ...s };
        (r.candidates || []).forEach(c => { n[`${c.source}>${t}`] = Math.max(0, Math.min(1, (c.score || 0) / 5)); });
        return n;
      });
      setStatus(`✨ scored ${r.candidates?.length || 0} link(s) for (${t})`);
    } catch (e) { setStatus("ERR " + e.message); }
    finally { setBusy(null); }
  };

  // Parser link-suggestion (DDPE / parser): scored candidate parents, NO explanation.
  // Suggested links render as dashed arcs with accept ✓ / reject ✕.
  const suggestLinks = async (t) => {
    if (t == null || t < 1) return;
    setNodeMenu(null);
    setBusy("suggestLinks"); setStatus(`🔮 suggesting links for (${t})…`);
    logEvent("link_tip_request", { target: t, snapshot: snapshot() });   // suggestion request on a NODE + partial-graph snapshot
    try {
      const r = await api("/api/suggest/links", {   // DDPE constrained scoring (no 32b) + RFC
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ edus: texts, speakers, target: t, dataset,
                               arcs: arcs.filter(a => Math.max(a.x,a.y) < t), rfc: true }),
      });
      if (r.error) { setStatus("ERR " + r.error); return; }
      const committed = new Set(arcs.filter(a => Math.max(a.x,a.y) === t).map(a => Math.min(a.x,a.y)));
      const raw = (r.candidates || [])     // DDPE /ddpe/score already gives score in 0..1
        .filter(c => c.source < t && !committed.has(c.source))
        .map(c => ({ source: c.source, score: Math.max(0, Math.min(1, c.score || 0)) }))
        .sort((a, b) => b.score - a.score);
      // FREEZE the colour basis at first suggestion: min-max over the FULL initial set,
      // and bake each link's colour now so accepting/rejecting one never recolours the rest.
      const ss = raw.map(l => l.score);
      const mn = Math.min(...(ss.length ? ss : [0])), mx = Math.max(...(ss.length ? ss : [0])), rng = mx - mn;
      const links = raw.map(l => {
        const nrm = rng > 1e-9 ? (l.score - mn) / rng : 1;
        return { ...l, color: `hsl(${Math.round(nrm * 120)}, 58%, 40%)` };
      });
      const cut = autoCutoff(ss);   // statistical (elbow + chance baseline) cutoff, frozen for this set
      setParserSug({ target: t, links, cut });
      const nKept = links.filter(l => l.score >= (autoThr ? cut : suggestThr)).length;
      setStatus(`🔮 ${nKept}/${links.length} link(s) for (${t})${autoThr ? ` · auto cutoff ${Math.round(cut*100)}%` : ""} — ✓/✕`);
    } catch (e) { setStatus("ERR " + e.message); }
    finally { setBusy(null); }
  };
  // Relation prediction SCORES (DDPE) for the selected arc — assists the manual
  // relation pick in the on-arc picker. No explanation, just scored ranking.
  const scoreRelArc = async (p, t) => {
    if (rawMode) return;   // manual mode: no parser suggestions
    setBusy("scoreRel"); setStatus(`🔮 scoring relations for (${p}→${t})…`);
    logEvent("rel_tip_request", { arc: [p, t], snapshot: snapshot() });   // relation suggestion on an ARC + snapshot
    try {
      const lo = Math.min(p, t), hi = Math.max(p, t), key = `${lo},${hi}`;
      let rels = relCacheRef.current[key];
      if (!rels) {
        const r = await api("/api/suggest/relation", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ edus: texts, speakers, source: lo, target: hi, dataset }),
        });
        if (r.error) { setStatus("ERR " + r.error); return; }
        rels = r.relations || []; relCacheRef.current[key] = rels;
      }
      // Adaptive cutoff (like the links) + normalisation so the above-cutoff cluster
      // shows > 50 and the tail < 50, preserving the original ranking.
      setRelScores({ key, ...normRelScores(rels) });
      setStatus(`🔮 relation scores for (${lo}→${hi})`);
    } catch (e) { setStatus("ERR " + e.message); }
    finally { setBusy(null); }
  };
  // Async PRECOMPUTE of DDPE relation scores for an arc (on link creation). Fills the
  // cache so the picker can PRE-ORDER the relation list — without showing the % until
  // the user explicitly asks (the suggestion). Fire-and-forget.
  const prefetchRelScores = (lo, hi) => {
    const key = `${lo},${hi}`;
    if (relCacheRef.current[key] || rawMode) return;
    (async () => {
      try {
        const r = await api("/api/suggest/relation", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body: JSON.stringify({ edus: texts, speakers, source: lo, target: hi, dataset }),
        });
        if (r && r.relations) { relCacheRef.current[key] = r.relations; _bumpRel(n => n + 1); }
      } catch (e) { /* preorder just won't apply */ }
    })();
  };
  const acceptSug = (src) => {
    const t = parserSug?.target; if (t == null) return;
    addArc(src, t); logEvent("parser_accept", { x: src, y: t });
    setParserSug(s => s && ({ ...s, links: s.links.filter(l => l.source !== src) }));
  };
  const rejectSug = (src) => {
    logEvent("parser_reject", { x: src, y: parserSug?.target });
    setParserSug(s => s && ({ ...s, links: s.links.filter(l => l.source !== src) }));
  };

  // Incremental walkthrough (optional): steps the target forward; candidates +
  // (opt-in) explanations show per EDU. Manual annotation works without it.
  // #27 — re-run the crossing-minimising incremental layout (continuous relayout).
  const relayoutIncr = (arcList, recenter = false) => {
    const n = edus.length;
    if (!n) return;
    // ONLY committed arcs shape the incremental layout (never gold → canvas stays clean).
    const a = arcList || arcs;
    if (recenter) centerPendingRef.current = true;   // recenter only on spacing/load, not on every arc add
    setPositions(layoutIncr(n, a, orientation === "horizontal", nodeSpacing, sizes));
  };
  const incrStart = () => { if (edus.length) { relayoutIncr(); setIncr({ t: 1 }); setSelTarget(1); } };
  const incrStop = () => { setIncr(null); setStatus("Incremental stopped."); };
  const incrLoad = (t) => { setIncr({ t }); setSelTarget(t);
    setStatus(`t=${t}: click a candidate arc to add it (manual), or ⓘ explain / ✨ score`); };
  const incrNext = () => {
    if (!incr) return;
    const nt = incr.t + 1;
    if (nt >= edus.length) { setIncr(null); setStatus("Incremental done."); return; }
    incrLoad(nt);
  };
  const incrPrev = () => { if (incr && incr.t > 1) incrLoad(incr.t - 1); };
  // Keep the target centred so its candidate arcs + callout are visible.
  React.useEffect(() => {
    if (candTarget == null) return;
    const id = setTimeout(() => {
      const el = nodeRefs.current[candTarget];
      if (el && incr) el.scrollIntoView({ block: "center", inline: "center", behavior: "smooth" });
    }, 90);
    return () => clearTimeout(id);
  }, [candTarget]);

  const suggestArcsFor = async (target) => {
    if (target == null || target < 1) return;
    setBusy("suggestArcs"); setStatus(`Suggesting parents for (${target})…`);
    try {
      const r = await api("/api/suggest/arcs", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ edus: texts, speakers, target }),
      });
      setSuggestions({ kind:"arcs", target, candidates: r.candidates });
      setStatus(`Got ${r.candidates.length} candidates.`);
    } catch (e) { setStatus("ERR " + e.message); }
    finally { setBusy(null); }
  };
  // Claude explanation for an arc (lo→hi). LINK and RELATION are SEPARATE operations.
  // The cache key includes the operation AND, for the relation, the CURRENTLY SELECTED
  // relation — so a different chosen relation gets its own (fresh) explanation, never a
  // stale one. `relation` is the user's chosen label (relation op only); on disagreement
  // the model names the relation it considers correct from the inventory.
  const fetchArcExpl = async (lo, hi, which, relation, useHint = false, relSource = "user") => {
    const cacheKey = which === "relC" ? `${lo},${hi}|rel|${relCanonRk(relation)}|${relSource}` : `${lo},${hi}|link`;
    if (explCacheRef.current[cacheKey]) {
      llmStatsRef.current.cacheHits++;
      logEvent("claude_explain_cache", { x: lo, y: hi, which });   // instant (no LLM time)
      return explCacheRef.current[cacheKey];
    }
    setBusy(which); setExplainingKey(cacheKey); setStatus(`✦ explaining the ${which === "linkC" ? "link" : "relation"} (${lo}→${hi})…`);
    logEvent("claude_explain", { x: lo, y: hi, which, relation, snapshot: snapshot() });
    const t0 = Date.now();
    try {
      const r = await api("/api/suggest/incremental", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ edus: texts, speakers, target: hi, parents: [lo],
                               arcs: arcs.filter(a => Math.max(a.x,a.y) <= hi), engine: "claude", dataset,
                               relation: which === "relC" ? relation : undefined,
                               relation_source: which === "relC" ? relSource : undefined,
                               dlg_idx: idx,
                               use_hint: useHint }),
      });
      const c = (r.candidates || []).find(z => z.parent === lo) || (r.candidates || [])[0];
      const ms = Date.now() - t0;
      // accumulate LLM "machine" time per condition (kept separate from human time)
      llmStatsRef.current.count++; llmStatsRef.current.ms += ms;
      logEvent("claude_explain_done", { x: lo, y: hi, which, ms, engine: c?.engine || "claude" });
      if (!c) { setStatus("No explanation returned."); return null; }
      explCacheRef.current[cacheKey] = c;
      setExplainedKeys(s => new Set(s).add(cacheKey));   // persist the ✦ on this triple (state → reliable re-render)
      setStatus(`✦ explained (${lo}→${hi}) in ${(ms/1000).toFixed(1)}s`);
      return c;
    } catch (e) { setStatus("ERR " + e.message); return null; }
    finally { setBusy(null); setExplainingKey(null); }
  };
  const explainLink = async (x, y) => {
    const lo = Math.min(x, y), hi = Math.max(x, y);
    const c = await fetchArcExpl(lo, hi, "linkC");
    if (c) setLinkExpl({ key: `${lo},${hi}`, data: c });
  };
  // The ✦ ON THE ARC: if the arc has NO relation yet → LINK explanation only. If a
  // relation is already assigned → BOTH link + relation in one panel (expandable sections).
  const explainArcSmart = async (x, y) => {
    const lo = Math.min(x, y), hi = Math.max(x, y);
    const a = arcs.find(r => Math.min(r.x,r.y) === lo && Math.max(r.x,r.y) === hi);
    if (!a?.type) { return explainLink(x, y); }     // unlabelled → link only
    const chosen = a.type;
    const relSource = a.origin === "parser" ? "parser" : "user";
    const link = await fetchArcExpl(lo, hi, "linkC");
    const rel = await fetchArcExpl(lo, hi, "relC", chosen, false, relSource);
    setLinkExpl(null); setRelExpl(null);
    setComboTab("rel");
    setComboExpl({ key: `${lo},${hi}`, link, rel, chosen });
  };
  // The score shown in an explanation panel must MATCH what the suggestion showed — i.e.
  // the DDPE parser score for that link / relation, not Claude's own confidence.
  const ddpeRelScore = (lo, hi, rel) => {
    const k = `${lo},${hi}`;
    // prefer the (rescaled) scores the SUGGESTION surfaced, so the explanation panel shows
    // the same number as the picker; fall back to the raw cache otherwise.
    const c = (relScores && relScores.key === k) ? relScores.relations : relCacheRef.current[k];
    if (!c || !rel) return null;
    const m = c.find(s => relCanonRk(s.relation) === relCanonRk(rel));
    return m ? m.score : null;
  };
  const ddpeLinkScore = (lo, hi) => {
    if (parserSug?.target === hi) { const l = parserSug.links.find(l => l.source === lo); if (l) return l.score; }
    const s = linkScores[`${lo}>${hi}`]; return s != null ? s : null;
  };
  // Explain a relation for arc x→y. `relOverride` = a specific relation (e.g. the row
  // being hovered); defaults to the arc's currently-set relation.
  const explainRelation = async (x, y, relOverride) => {
    const lo = Math.min(x, y), hi = Math.max(x, y);
    const a = arcs.find(r => Math.min(r.x,r.y) === lo && Math.max(r.x,r.y) === hi);
    const chosen = relOverride || a?.type || "";
    const cached = relCacheRef.current[`${lo},${hi}`] || [];
    // inject pre-computed hints only when the parser already scored this arc
    const useHint = cached.length > 0;
    const c = await fetchArcExpl(lo, hi, "relC", chosen, useHint);
    if (c) setRelExpl({ key: `${lo},${hi}`, data: c, chosen });
  };
  const explainArc = async (x, y) => {
    const lo = Math.min(x, y), hi = Math.max(x, y);
    setBusy("explain"); setStatus(`Explaining (${lo}→${hi})…`); setExplanation(null);
    try {
      const r = await api("/api/explain/arc", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ edus: texts, speakers, source: lo, target: hi, dataset }),
      });
      setExplanation(r);
      setStatus(r.backend_available === false ? "Explain: no LLM backend." : `Explained (${lo}→${hi}).`);
    } catch (e) { setStatus("ERR " + e.message); }
    finally { setBusy(null); }
  };

  const suggestLabel = async (x, y) => {
    const key = `${x},${y}`;
    const cached = precompute?.labels?.[key];
    if (cached?.label) {
      setLabel(x, y, cached.label);
      setStatus(`⚡ Label (${x}→${y}) = ${cached.label} [conf ${cached.confidence}]`);
      return;
    }
    setBusy("suggestLabel"); setStatus(`Labelling (${x}→${y})…`);
    try {
      const r = await api("/api/suggest/label", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ edus: texts, speakers, source: x, target: y }),
      });
      if (r.label) {
        setLabel(x, y, r.label);
        setStatus(`Labelled (${x}→${y}) = ${r.label} [conf ${r.confidence}]`);
      } else { setStatus(`No label returned.`); }
    } catch (e) { setStatus("ERR " + e.message); }
    finally { setBusy(null); }
  };
  const suggestThreads = async () => {
    setBusy("suggestThreads"); setStatus("Clustering threads…");
    try {
      const r = await api("/api/suggest/threads", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ edus: texts, speakers }),
      });
      setThreads(r.threads || []); setDirty(true);
      setStatus(`${(r.threads||[]).length} threads proposed.`);
    } catch (e) { setStatus("ERR " + e.message); }
    finally { setBusy(null); }
  };
  const extractDagThreads = async () => {
    if (!arcs.length) { setStatus("No arcs — nothing to thread."); return; }
    setBusy("dagThreads"); setStatus("Extracting DAG threads…");
    try {
      const r = await api("/api/discourse/threads", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ arcs, n_edus: edus.length }),
      });
      setDagThreads(r.threads || []);
      setActiveDagPath(null); setDagPathLocked(false); setDagLabels({});
      setStatus(`${(r.threads||[]).length} discourse thread(s) found.`);
    } catch(e) { setStatus("ERR " + e.message); }
    finally { setBusy(null); }
  };

  const labelDagPath = async (ti) => {
    const t = dagThreads[ti];
    if (!t) return;
    setDagLabels(prev => ({...prev, [ti]: {label: null, summary: null, loading: true}}));
    const texts   = edus.map(e => e.text);
    const spks    = edus.map(e => e.speaker);
    const arcRels = {};
    arcs.forEach(a => { if (a.type) arcRels[`${a.x},${a.y}`] = a.type; });
    try {
      const r = await api("/api/discourse/path_label", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ path: t.path, edus: texts, speakers: spks, arc_rels: arcRels }),
      });
      setDagLabels(prev => ({...prev, [ti]: {label: r.label, summary: r.summary, loading: false}}));
    } catch(e) {
      setDagLabels(prev => ({...prev, [ti]: {label: "error", summary: e.message, loading: false}}));
    }
  };

  const labelAllDagPaths = async () => {
    for (let i = 0; i < dagThreads.length; i++) await labelDagPath(i);
  };

  const suggestFull = async () => {
    if (arcs.length && !confirm("Replace current arcs with LLM full-pass output?")) return;
    setBusy("suggestFull"); setStatus("Running H-iterative full pass…");
    try {
      const r = await api("/api/suggest/full", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ dataset, edus: texts, speakers }),
      });
      setArcs((r.arcs || []).sort((a,b) => a.y - b.y || a.x - b.x));
      setDirty(true);
      setStatus(`Full pass: ${(r.arcs||[]).length} arcs (merged=${r.merged_count}).`);
    } catch (e) { setStatus("ERR " + e.message); }
    finally { setBusy(null); }
  };

  const seedGold = () => {
    if (arcs.length && !confirm("Replace current annotation with gold?")) return;
    const gold = (dial.gold || []).map(g => ({...g, score:0}));
    setArcs(gold);
    // ITERATIVE layout (same principle as manual annotation): add the gold arcs one by one
    // and re-run the incremental layout after each, then render the final arrangement.
    setLayoutKind("incr");
    setPositions(layoutGoldIncr(edus.length, gold, orientation === "horizontal", nodeSpacing, sizes));
    centerPendingRef.current = true;
    setDirty(true);
    setStatus("Loaded gold (layout arranged to reduce overlaps).");
  };
  const clearAll = () => {
    if (arcs.length && !confirm("Clear all arcs?")) return;
    setArcs([]);
    // no arcs → lay the EDUs out in the alternating ±100 zigzag (sequence, no overlaps).
    setLayoutKind("incr");
    setPositions(layoutAlternating(edus.length, orientation === "horizontal", nodeSpacing, sizes));
    centerPendingRef.current = true;
    setDirty(true);
  };
  const applyLayout = (kind) => {
    const n = edus.length;
    if (!n) return;
    let p;
    if (kind === "linear") p = layoutLinear(n);
    else if (kind === "incr") { setPositions(layoutIncr(n, arcs, orientation === "horizontal", nodeSpacing, sizes)); setDirty(true); return; }
    else if (kind === "columns") p = layoutColumns(n);
    else if (kind === "threads") p = layoutThreads(n, arcs.length ? arcs : (dial?.gold || []));
    else if (kind === "auto") p = layoutAuto(n, arcs.length ? arcs : (dial?.gold || []));
    else if (kind === "speakers") p = layoutSpeakers(n, speakers);
    else if (kind === "tree") p = layoutTree(n, arcs.length ? arcs : (dial?.gold || []));
    setLayoutKind(kind === "auto" ? "swimlane" : kind);
    setPositions(orientPos(p)); setDirty(true);
  };
  // Flip existing positions (x↔y) when the orientation toggles — preserves drags.
  const prevOrientRef = useRef(orientation);
  useEffect(() => {
    if (prevOrientRef.current === orientation) return;
    prevOrientRef.current = orientation;
    // In incremental, re-run the orientation-aware layout (don't blind-transpose).
    if (incr) { relayoutIncr(); return; }
    setPositions(pm => Object.fromEntries(Object.entries(pm).map(([k, v]) => [k, { x: v.y, y: v.x }])));
  }, [orientation]);
  // Live EDU-spacing slider: ALWAYS re-flow as the user drags it (don't gate on
  // layoutKind — the spacing control must keep working throughout the session).
  useEffect(() => {
    if (!edus.length) return;
    if (layoutKind !== "incr") setLayoutKind("incr");
    relayoutIncr(undefined, true);
  }, [nodeSpacing]);

  // One-shot size-aware relayout: the dialogue-load effect runs before the DOM
  // measures node widths, so positions are initially computed with the NODE_W=300
  // fallback. Once all nodes are measured, redo the layout with real sizes so
  // the 210px gap is edge-to-edge (not 300px-assumed-width + 210px).
  const sizeLayoutDoneRef = useRef(null);
  useEffect(() => {
    if (!edus.length || layoutKind !== "incr") return;
    if (Object.keys(sizes).length < edus.length) return;   // wait until all nodes measured
    if (sizeLayoutDoneRef.current === dial?.id) return;     // already done for this dialogue
    sizeLayoutDoneRef.current = dial?.id;
    relayoutIncr(undefined, true);
  }, [sizes, dial?.id, layoutKind, edus.length]);

  const testLayouts = () => {
    const n = edus.length;
    if (!n) return;
    const candidates = [
      ["linear",  layoutLinear(n)],
      ["columns", layoutColumns(n)],
      ["auto",    layoutAuto(n, arcs)],
      ["current", positions],
    ];
    const rows = candidates.map(([name, pos]) => {
      const m = layoutMetrics(pos, sizes, arcs, n);
      return { name, ...m };
    });
    console.table(rows);
    const msg = rows.map(r =>
      `${r.name}: overlaps=${r.nodeOverlaps} arcHits=${r.arcNodeHits} lanes=${r.lanes} ${r.width}x${r.height}`
    ).join(" | ");
    setStatus(msg);
    // Pick best: fewest arc hits, then fewest overlaps, then smallest area
    const rank = rows.slice(0, 3).slice().sort((a, b) =>
      (a.arcNodeHits - b.arcNodeHits)
      || (a.nodeOverlaps - b.nodeOverlaps)
      || (a.width*a.height - b.width*b.height));
    const best = rank[0].name;
    return best;
  };

  // ── AUTH GATE FIRST: no token / not logged in → login screen immediately, BEFORE we
  //    wait on config (so a reload with no session always lands on login). ──
  if (auth === null) {
    // same spinner as the config-loading screen → a single, consistent loading visual
    return (
      <div className="app-loading">
        <div className="app-loading-orbit">
          <span className="brand" style={{fontSize:20}}>
            <svg className="brand-arc" viewBox="0 0 48 12" preserveAspectRatio="none">
              <path d="M3,11 C 3,2 45,2 45,11"/><circle cx="3" cy="11" r="2"/><circle cx="45" cy="11" r="2.4"/>
            </svg>
            <span className="b-co">MuDi</span><span className="b-da">PA</span>
          </span>
        </div>
      </div>
    );
  }
  if (!auth.authed) {
    return (
      <div className="auth-screen">
        <form className="auth-card" onSubmit={e => { e.preventDefault(); doLogin(); }}>
          <div className="auth-brand"><span className="b-co">MuDi</span><span className="b-da">PA</span></div>
          <div className="auth-sub">Multi-party Dialogue Parsing Assistant · study sign-in</div>
          <label className="auth-lbl">Participant code</label>
          <input className="study-in" autoFocus placeholder="e.g. USER_017" value={loginForm.code}
                 onChange={e => setLoginForm(f => ({ ...f, code: e.target.value, err: "" }))}/>
          <label className="auth-lbl">Study password</label>
          <input className="study-in" type="password" placeholder="shared password" value={loginForm.pw}
                 onChange={e => setLoginForm(f => ({ ...f, pw: e.target.value, err: "" }))}/>
          {loginForm.err && <div className="auth-err">{loginForm.err}</div>}
          <button className="btn primary" type="submit" style={{width:"100%", marginTop:12}}>Enter</button>
          <div style={{display:"flex", alignItems:"center", gap:10, margin:"14px 0 10px", color:"var(--fg-3)", fontSize:11}}>
            <span style={{flex:1, height:1, background:"var(--border-1)"}}></span>or<span style={{flex:1, height:1, background:"var(--border-1)"}}></span>
          </div>
          <button type="button" className="btn" style={{width:"100%"}} onClick={guestLogin}>Explore as guest — no sign-in</button>
          <div className="auth-foot">Study sign-in logs your actions anonymously under your participant code. <b>Guest mode</b> skips sign-in and collects no data.</div>
        </form>
      </div>
    );
  }
  if (auth.needs_profile) {
    const set = (k, v) => setProfileForm(f => ({ ...f, [k]: v, err: "" }));
    return (
      <div className="auth-screen">
        <form className="auth-card wide" onSubmit={e => { e.preventDefault(); doProfile(); }}>
          <div className="auth-brand"><span className="b-co">MuDi</span><span className="b-da">PA</span></div>
          <div className="auth-sub">Welcome, <b>{auth.participant}</b> · a few questions before we start</div>
          <label className="auth-lbl">Age *</label>
          <input className="study-in" type="number" min="16" max="99" value={profileForm.age}
                 onChange={e => set("age", e.target.value)}/>
          <label className="auth-lbl">Gender *</label>
          <select className="study-in" value={profileForm.gender} onChange={e => set("gender", e.target.value)}>
            <option value="">— select —</option><option>Woman</option><option>Man</option>
            <option>Non-binary</option><option>Prefer to self-describe</option><option>Prefer not to say</option></select>
          <label className="auth-lbl">Highest education *</label>
          <select className="study-in" value={profileForm.education} onChange={e => set("education", e.target.value)}>
            <option value="">— select —</option><option>High school</option><option>Bachelor’s degree</option>
            <option>Master’s degree</option><option>PhD or higher</option><option>Other</option></select>
          <label className="auth-lbl">Linguistics / NLP background *</label>
          <select className="study-in" value={profileForm.ling_background} onChange={e => set("ling_background", e.target.value)}>
            <option value="">— select —</option><option>None</option><option>Some (courses)</option>
            <option>Working knowledge</option><option>Expert / researcher</option></select>
          <label className="auth-lbl">Discourse-annotation experience *</label>
          <select className="study-in" value={profileForm.annotation_exp} onChange={e => set("annotation_exp", e.target.value)}>
            <option value="">— select —</option><option>None</option><option>Tried once or twice</option>
            <option>Occasional</option><option>Experienced</option></select>
          {profileForm.err && <div className="auth-err">{profileForm.err}</div>}
          <button className="btn primary" type="submit" style={{width:"100%", marginTop:14}}>Start annotating</button>
        </form>
      </div>
    );
  }

  // authed → now wait for config before rendering the annotator
  if (!config) return (
    <div className="app-loading">
      <div className="app-loading-orbit">
        <span className="brand" style={{fontSize:20}}>
          <svg className="brand-arc" viewBox="0 0 48 12" preserveAspectRatio="none">
            <path d="M3,11 C 3,2 45,2 45,11"/><circle cx="3" cy="11" r="2"/><circle cx="45" cy="11" r="2.4"/>
          </svg>
          <span className="b-co">MuDi</span><span className="b-da">PA</span>
        </span>
      </div>
    </div>
  );
  const ds = config.datasets.find(d => d.name === dataset) || config.datasets[0];
  const parents_of_selTarget = selTarget != null ? (parentsOf[selTarget] || []) : [];

  if (isAdmin) return <AdminPage participant={participant} onLogout={doLogout} config={config} />;

  return (
    <div className="app">
      <div className="hdr">
        <span className="brand" title="MuDiPA · Multi-party Dialogue Parsing Assistant">
          <svg className="brand-arc" viewBox="0 0 48 12" preserveAspectRatio="none">
            <path d="M3,11 C 3,2 45,2 45,11"/>
            <circle cx="3" cy="11" r="2"/><circle cx="45" cy="11" r="2.4"/>
          </svg>
          <span className="b-co">MuDi</span><span className="b-da">PA</span>
        </span>
        {study && study.phase === "annotate" && (
          <div className="hdr-study">
            <span className="study-prog">Dialogue <b>{study.step + 1}</b> of {study.plan.length}</span>
            {(study.step % PER_COND) !== 0 && (
              <button className="btn ghost" style={{padding:"3px 9px"}} onClick={studyPrev} disabled={busy==="save"}>← prev</button>
            )}
            <button className="btn primary" style={{padding:"3px 11px"}} onClick={studyDoneDialogue} disabled={busy==="save"}>
              {study.step + 1 < study.plan.length ? "Done — next →" : "Done — finish →"}</button>
          </div>
        )}
        {study && study.phase === "done" && (
          <span className="study-prog" style={{marginLeft:12}}>✓ Study complete — thank you!</span>
        )}
        {isExperimenter && <>
        <div className="tb-cluster">
          <span className="tb-eyebrow">Load</span>
          <DatasetPicker config={config} dataset={dataset} onPick={nd => {
            const nds = config.datasets.find(x => x.name === nd);
            const splits = (nds && nds.splits) || [];
