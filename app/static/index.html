                              onMouseDown={ev => ev.stopPropagation()}
                              onClick={ev => { ev.stopPropagation(); reconfirm(i, true); }}>
                              <span className="warn-ico">⚠</span> re-confirm</button>}
                    </div>
                    <div className="node-txt" style={{fontSize: nodeFontSize}}>{e.text}</div>
                    {/* Per-EDU media segment IN THE CANVAS: this utterance's own MELD
                        clip on its node (video+audio, or audio-only). preload=metadata
                        keeps it light; stopPropagation so controls don't start a drag. */}
                    {e.clip_src && (e.clip_type === "video"
                      ? <video src={e.clip_src} controls preload="metadata"
                               onMouseDown={ev => ev.stopPropagation()}
                               style={{width: 220, maxWidth: "100%", marginTop: 6,
                                       borderRadius: 6, background: "#000", display: "block"}} />
                      : <audio src={e.clip_src} controls preload="none"
                               onMouseDown={ev => ev.stopPropagation()}
                               style={{width: 220, maxWidth: "100%", marginTop: 6, display: "block"}} />)}
                    {/* lightbulb: ask the parser to suggest parent links for this EDU */}
                    {selected && i >= 1 && !rawMode && (
                      <button className="node-bulb bulb tip" data-tip="link suggestion"
                              disabled={busy === "suggestLinks"}
                              onMouseDown={ev => ev.stopPropagation()}
                              onClick={ev => { ev.stopPropagation(); suggestLinks(i); }}>
                        {busy === "suggestLinks" ? <span className="spinner"></span> :
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                               strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M9 18h6"/><path d="M10 22h4"/>
                            <path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/>
                          </svg>}
                      </button>
                    )}
                  </div>
                );
              })}

              {/* ── Parser-suggested link controls: accept ✓ / reject ✕ at the midpoint.
                    The score COLOUR is MIN-MAX normalized within this suggestion set:
                    nrm = (x - min) / (max - min) → worst=red, best=green. The box border
                    takes the same colour. The % text stays the raw DDPE score. ── */}
              {parserSug && !selArc && (() => {
                return parserSug.links.map(({ source, score, color }) => {
                const pass = (score || 0) >= (autoThr ? parserSug.cut : suggestThr);
                const t = parserSug.target, lo = Math.min(source, t), hi = Math.max(source, t);
                const ps = positions[lo], pt = positions[hi];
                if (!ps || !pt) return null;
                const g = arcGeomSmart(ps, pt, sizes[lo], sizes[hi],
                  lo, hi, positions, sizes, edus.length, { bow: 0 }, orient);
                const m = g.mid || { x:(ps.x+pt.x)/2, y:(ps.y+pt.y)/2 };
                const sv = Math.max(0, Math.min(1, score || 0));
                const pct = Math.round(sv * 100);
                const scoreCol = color || "#888";   // FROZEN at suggestion time (no recolour on accept)
                const pid = `ch-${source}-${t}`, off = panelOff[pid] || { dx:0, dy:0 };
                // EDGE-PIN: if the proposal sits OUTSIDE the visible viewport, clamp it to the
                // nearest edge (a bubble) so its ✓/✕ stay reachable even when scrolled away.
                void vpTick;
                let px = m.x + off.dx, py = m.y + off.dy, pinned = false, pinSide = "";
                const wrap = canvasWrapRef.current, zz = zoom || 1;
                if (wrap) {
                  const cbEl = document.querySelector(".codebook");
                  const cbW = cbEl ? cbEl.getBoundingClientRect().width + 18 : 0;
                  const mg = 70 / zz;
                  // visible viewport mapped to canvas coords, accounting for the pan translate
                  const L = (-pan.x) / zz + mg, R = (wrap.clientWidth - cbW - pan.x) / zz - mg;
                  const T = (-pan.y) / zz + mg, B = (wrap.clientHeight - pan.y) / zz - mg;
                  const cx = Math.min(Math.max(px, L), Math.max(L, R));
                  const cy = Math.min(Math.max(py, T), Math.max(T, B));
                  if (Math.abs(cx - px) > 0.5 || Math.abs(cy - py) > 0.5) {
                    pinned = true;
                    const ox = px - cx, oy = py - cy;   // overflow → where the real content is
                    pinSide = Math.abs(ox) >= Math.abs(oy) ? (ox > 0 ? "right" : "left")
                                                           : (oy > 0 ? "bottom" : "top");
                    px = cx; py = cy;
                  }
                }
                return (
                  <div key={"sg-"+source} className={`prop-chip${pinned ? " pinned pin-" + pinSide : ""}${pass ? "" : " faint"}`}
                       style={{left: px, top: py, cursor:"move", zIndex: pinned ? 18 : (pass ? 9 : 8), "--score-col": scoreCol}}
                       onMouseDown={e => onPanelDown(pid, e)}
                       title={pinned
                         ? `DDPE: (${source}) → (${t}) · ${pct} — proposal is off-screen, pinned to the edge`
                         : pass
                           ? `DDPE parser: (${source}) → (${t}) · link score ${pct} — drag to move`
                           : `DDPE: (${source}) → (${t}) · ${pct} — below the auto-cutoff (still a valid parent) — accept anyway?`}>
                    <span className="pc-link">
                      <b style={{color: spkColor[edus[source]?.speaker]}}>{source}</b> → <b style={{color: spkColor[edus[t]?.speaker]}}>{t}</b>
                    </span>
                    <span className="pc-circle" style={{borderColor: scoreCol, color: scoreCol}}>{pct}</span>
                    <div className="pc-acts">
                      <button className="pc-yes" title={`accept (${source} → ${t})`}
                              onClick={ev => { ev.stopPropagation(); acceptSug(source); }}>✓</button>
                      <button className="pc-no" title="reject"
                              onClick={ev => { ev.stopPropagation(); rejectSug(source); }}>✕</button>
                    </div>
                  </div>
                );
              });
              })()}

              {/* ── Node options panel (opens on node click). For the SELECTED EDU:
                    "suggest links" (parser). For a clicked PREDECESSOR: "connect X→Y".
                    Positioned beside the node by orientation. (Explanations removed —
                    will return later in a different form.) ── */}
              {nodeMenu && nodeMenu.kind === "connect" && (() => {
                // compact CONNECT icon ON the preview arc, near the PARENT end (lower index),
                // so it never drifts off-screen far from the action. Click = create src→tgt.
                const lo = Math.min(nodeMenu.src, nodeMenu.tgt), hi = Math.max(nodeMenu.src, nodeMenu.tgt);
                if (!positions[lo] || !positions[hi]) return null;
                const g = arcGeomSmart(positions[lo], positions[hi], sizes[lo], sizes[hi],
                  lo, hi, positions, sizes, edus.length, { bow: 0 }, orient);
                // parent = lower index = t≈0.22 along the lo→hi curve (near the parent node)
                const at = g.pts ? bezierAt(g.pts, 0.22) : g.mid;
                const style = { left: at.x, top: at.y };
                return (
                  <button className="connect-btn tip" data-tip={`connect ${nodeMenu.src} → ${nodeMenu.tgt}`}
                          style={style}
                          onMouseDown={e => e.stopPropagation()}
                          onClick={e => { e.stopPropagation(); addArc(nodeMenu.src, nodeMenu.tgt); setNodeMenu(null); }}>
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M9 17H7A5 5 0 0 1 7 7h2"/><path d="M15 7h2a5 5 0 0 1 0 10h-2"/><line x1="8" y1="12" x2="16" y2="12"/>
                    </svg>
                  </button>
                );
              })()}
              {/* ── On-arc relation picker: select an arc → dropdown to LABEL it by
                  hand. Hidden while an explanation panel is open (avoid overlay clutter). */}
              {selArc && !linkExpl && !relExpl && !comboExpl && (() => {
                const k = `${selArc[0]},${selArc[1]}`;
                const lp = labelPositions[k];
                if (!lp) return null;
                const a = arcs.find(r => r.x === selArc[0] && r.y === selArc[1]);
                const col = a?.type ? (relColor(a.type) || "#888") : "var(--border-0)";
                const lo = Math.min(selArc[0], selArc[1]), hi = Math.max(selArc[0], selArc[1]);
                const scored = (!rawMode && relScores && relScores.key === k) ? relScores.relations : null;
                const relCut = (relScores && relScores.key === k) ? (relScores.cut || 0) : null;   // adaptive cutoff (like links)
                // %/bars show ONLY after an explicit suggestion (scored). But if PREORDER is
                // on and the parser scores were precomputed (cache), order the list by them
                // WITHOUT revealing the numbers.
                const cached = relCacheRef.current[k] || null;
                // reorder by score ONLY after the 💡 (scored); ignore the precomputed cache so
                // the default order stays alphabetical until the user explicitly asks.
                const ordering = scored;
                const orderByRk = {};
                if (ordering) ordering.forEach(s => { orderByRk[relCanonRk(s.relation)] = s.score; });
                const scoreByRk = {};   // numbers shown ONLY when explicitly scored
                if (scored) scored.forEach(s => { scoreByRk[relCanonRk(s.relation)] = s.score; });
                let rels = [...(config?.relations || [])];
                // reorder by score ONLY after the 💡 was pressed (scored); otherwise alphabetical.
                if (ordering) rels.sort((x, y) => (orderByRk[relCanonRk(y)] || 0) - (orderByRk[relCanonRk(x)] || 0));
                else rels.sort((x, y) => relFull(x).localeCompare(relFull(y)));
                // ambiguity flag: small top1−top2 margin in the DDPE relation scores → escalate to Claude
                const mg = (scored || cached) ? scoreMargin((scored || cached).map(s => s.score)) : null;
                // AUTOMATIC ambiguity: scale-free relative margin — the runner-up is "close"
                // when the top1−top2 gap is less than half of top1 (i.e. top2 ≳ ⅓ of the
                // mass between them). Manual mode falls back to the absolute slider.
                const ambiguous = mg && (autoAmbig ? (mg.top1 > 0 && mg.margin < 0.5 * mg.top1) : mg.margin < ambigThr);
                const top2names = (scored || cached) ? (scored || cached).slice(0, 2).map(s => relFull(s.relation)) : [];
                const pid = `pk-${lo}-${hi}`, off = panelOff[pid] || { dx:0, dy:0 };
                // CENTRE the picker in the VISIBLE viewport (.canvas-wrap), accounting for the
                // pan TRANSLATE and zoom — the picker lives in canvas coords, so the content
                // coord that lands at viewport-centre is (viewportCentre − pan) / zoom.
                // If the codebook is docked open on the right, subtract half its width so the
                // picker stays centred in the FREE area, not under the codebook.
                const wrap = canvasWrapRef.current, zz = zoom || 1;
                const vw = wrap ? wrap.clientWidth : (typeof window !== "undefined" ? window.innerWidth : 1200);
                // codebook is ALWAYS docked open while the picker is shown (both need selArc),
                // so compute its width DETERMINISTICALLY — measuring the DOM would read 0 on the
                // first render (codebook not yet committed) and then snap the picker on the next.
                const cbW = Math.min(440, vw * 0.40) + 18;
                const cx = wrap ? ((vw - cbW) / 2 - pan.x) / zz : lp.x;
                const cy = wrap ? (wrap.clientHeight / 2 - pan.y) / zz : lp.y;
                return (
                  <div className="arc-rel-picker" style={{left: cx + off.dx, top: cy + off.dy,
                         transform:"translate(-50%, -50%)", borderColor: col,
                         boxShadow:`0 0 0 2px ${a?.type ? col+"66" : "transparent"}, 0 6px 18px rgba(40,55,80,.28)`}}
                       onMouseDown={e => onPanelDown(pid, e)} onClick={e => e.stopPropagation()}>
                    <div className="arp-row">
                      <span className="arp-edge">
                        <b style={{color: spkColor[edus[lo]?.speaker]}}>{lo}</b>
                        <span style={{color:"var(--fg-2)"}}>→</span>
                        <b style={{color: spkColor[edus[hi]?.speaker]}}>{hi}</b>
                      </span>
                      <span style={{flex:1}}></span>
                      {!rawMode && <button className="bulb bulb-sm tip" data-tip="relation suggestion"
                              disabled={busy === "scoreRel"} onClick={() => scoreRelArc(lo, hi)}>
                        {busy === "scoreRel" ? <span className="spinner"></span> :
                          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                               strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M9 18h6"/><path d="M10 22h4"/>
                            <path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/>
                          </svg>}</button>}
                      {/* link-explain trigger is a floating ✦ button ON the arc (below);
                          relation-explain trigger is on the current relation row. */}
                      {/* delete is a red ✕ button ON the arc; here only CLOSE panel */}
                      <button className="arp-close tip" data-tip="close panel"
                              onClick={() => setSelArc(null)}>✕</button>
                    </div>
                    {(hi - lo) > 5 && <div className="arp-longdist-warn">⚠ Long-distance arc ({hi - lo} EDUs apart) — system suggestions may be less reliable here.</div>}
                    <div className="arp-scores scroll">
                      {(() => {
                        const relsAbove = scored ? rels.filter(r => { const sc = scoreByRk[relCanonRk(r)]; return sc != null && relCut != null && sc >= relCut; }) : [];
                        const relsBelow = scored ? rels.filter(r => { const sc = scoreByRk[relCanonRk(r)]; return !(sc != null && relCut != null && sc >= relCut); }) : rels;
                        const showDivider = scored && relsBelow.length > 0;
                        const renderRow = (r) => {
                        const cur = a?.type && relCanonRk(a.type) === relCanonRk(r);
                        const sc = scoreByRk[relCanonRk(r)];
                        const passed = sc != null && relCut != null && sc >= relCut;
                        const rkey = `${lo},${hi}|rel|${relCanonRk(r)}`;
                        const cachedExpl = !rawMode && explainedKeys.has(rkey);
                        const inProg = explainingKey === rkey;
                        return (
                        <div key={r} className={`arp-sc ${cur ? "cur" : ""} ${passed ? "suggested" : ""} ${(relCut != null && !passed) ? "below" : ""}`}
                             onClick={() => { setLabel(selArc[0], selArc[1], r); }}
                             title={`set ${relFull(r)}`}>
                          <span className="legend-sw" style={{background: relColor(r) || "#888"}}></span>
                          <span className="arp-rel">{relFull(r)}</span>
                          {passed && <><span className="arp-bar" style={{width: Math.max(4, Math.round(sc*120))}}></span>
                            <span className="arp-pct">{Math.round(sc*100)}</span></>}
                          {/* explain ✦ on hover of ANY relation row; PERSISTS (no hover needed)
                              once that relation is being explained or already cached. */}
                          {!rawMode && <button className={`arp-explain tip ${cachedExpl ? "cached" : ""} ${(cur||inProg) ? "show" : ""}`}
                              data-tip={cachedExpl ? "show explanation" : "explain this relation"}
                              disabled={busy === "relC"}
                              onClick={ev => { ev.stopPropagation(); explainRelation(selArc[0], selArc[1], r); }}>
                            {inProg ? <span className="spinner"></span> : "✦"}</button>}
                        </div>
                        );
                        };
                        return (<>{
                          scored ? relsAbove.map(renderRow) : rels.map(renderRow)
                        }{showDivider && <div className="arp-divider">not suggested by the system</div>}{
                          scored ? relsBelow.map(renderRow) : null
                        }</>);
                      })()}
                    </div>
                  </div>
                );
              })()}
              {/* ✦ LINK-explain + ✕ DELETE controls — shown for the arc near the cursor
                  (250px tolerance band) or the selected arc; ALSO kept for the arc whose
                  explanation is being COMPUTED (busy), so the spinner doesn't vanish when
                  the cursor leaves before it finishes. Hidden once a panel is open. */}
              {!rawMode && !(linkExpl || relExpl || comboExpl) && (() => {
                // target arc = hovered / selected, OR (during compute) the arc being explained
                let ha = hoverArc || selArc;
                if (!ha && explainingKey) {
                  const [elo, ehi] = explainingKey.split("|")[0].split(",").map(Number);
                  const ea = arcs.find(r => Math.min(r.x,r.y)===elo && Math.max(r.x,r.y)===ehi);
                  if (ea) ha = [ea.x, ea.y];
                }
                if (!ha) return null;
                return [arcs.find(a => a.x===ha[0] && a.y===ha[1])].filter(Boolean);
              })()?.map(a => {
                const lo = Math.min(a.x, a.y), hi = Math.max(a.x, a.y);
                if (!positions[lo] || !positions[hi] || hi > visibleMax) return null;
                const kk = `${a.x},${a.y}`;
                const g = arcGeomSmart(positions[lo], positions[hi], sizes[lo], sizes[hi],
                  lo, hi, positions, sizes, edus.length, { bow: arcBowEff[kk] || 0 }, orient);
                // anchor on the LABEL point; the two buttons sit SYMMETRICALLY about it —
                // equal horizontal (±26) and equal vertical (+30 below) distance.
                const lp = labelPositions[kk] || g.mid;
                const HG = 26, VG = 30;
                const ex = { x: lp.x + HG, y: lp.y + VG };   // ✦ right-below
                const del = { x: lp.x - HG, y: lp.y + VG };  // ✕ left-below — mirror of ✦
                const hasRel = !!a.type;
                const cached = hasRel
                  ? (explCacheRef.current[`${lo},${hi}|link`] && explCacheRef.current[`${lo},${hi}|rel|${relCanonRk(a.type)}`])
                  : explCacheRef.current[`${lo},${hi}|link`];
                const tip = hasRel
                  ? (cached ? "show explanation — link + relation" : "explain link + relation")
                  : (cached ? "show link explanation" : "explain link");
                const dim = parserSug?.target != null && a.x !== parserSug.target && a.y !== parserSug.target;
                return (
                  <React.Fragment key={"ac-"+kk}>
                    <button className={`arc-explain tip ${cached ? "cached" : ""}`}
                          style={{left: ex.x, top: ex.y, opacity: dim ? 0.15 : 1}}
                          data-tip={tip}
                          disabled={busy === "linkC" || busy === "relC"}
                          onMouseDown={e => e.stopPropagation()}
                          onClick={e => { e.stopPropagation(); explainArcSmart(a.x, a.y); }}>
                    {(busy === "linkC" || busy === "relC") ? <span className="spinner"></span> : "✦"}</button>
                    <button className="arc-del tip" style={{left: del.x, top: del.y, opacity: dim ? 0.15 : 1}}
                          data-tip="delete this arc"
                          onMouseDown={e => e.stopPropagation()}
                          onClick={e => { e.stopPropagation(); delArc(a.x, a.y); if (selArc && selArc[0]===a.x && selArc[1]===a.y) setSelArc(null); }}>✕</button>
                  </React.Fragment>
                );
              })}
            </div>
            </div>{/* /pan-layer */}
            {/* custom scrollbars (the canvas pans by translate; these reflect the utterance
                bbox and let you scroll by dragging the thumb). Hidden when content fits. */}
            {contentBox && canvasWrapRef.current && (() => {
              const wrap = canvasWrapRef.current;
              const mk = (axis) => {
                const { z, view, c0, total } = scrollRange(axis, wrap);
                const visStart = (axis === "h" ? -pan.x : -pan.y) / z;
                const sizeF = Math.min(1, (view / z) / total);
                const posF = Math.max(0, Math.min(1 - sizeF, (visStart - c0) / total));
                return { sizeF, posF };
              };
              const h = mk("h"), v = mk("v");
              return <>
                {h.sizeF < 0.999 && <div className="cv-scroll h">
                  <div className="cv-thumb" style={{ left: `${h.posF*100}%`, width: `${h.sizeF*100}%` }}
                       onMouseDown={e => startScrollDrag("h", e)}/></div>}
                {v.sizeF < 0.999 && <div className="cv-scroll v">
                  <div className="cv-thumb" style={{ top: `${v.posF*100}%`, height: `${v.sizeF*100}%` }}
                       onMouseDown={e => startScrollDrag("v", e)}/></div>}
              </>;
            })()}
          </div>{/* /canvas-wrap */}
            {/* Full-viewport fade while an explanation is open — grays the ENTIRE visible
                canvas (every node + arc, the explained one included). Covers the real
                viewport area (not just the content box), so no white strip remains. */}
            {(linkExpl || relExpl || comboExpl) && (
              <div className="canvas-scrim"
                   onClick={() => { setLinkExpl(null); setRelExpl(null); setComboExpl(null); }}></div>
            )}
            {/* ── Claude LINK explanation — centred in the canvas viewport ── */}
            {linkExpl && (() => {
              const [lo, hi] = linkExpl.key.split(",").map(Number);
              const d = linkExpl.data || {};
              return (
                <div className="xpl-callout centered" onClick={e => e.stopPropagation()}>
                  <div className="xpl-hd"><span className="xpl-spark">✦</span> Link explanation
                    <span className="xpl-edge"><b style={{color:spkColor[edus[lo]?.speaker]}}>{lo}</b>→<b style={{color:spkColor[edus[hi]?.speaker]}}>{hi}</b></span>
                    <span style={{flex:1}}></span>
                    <button className="rbtn" title="close" onClick={() => setLinkExpl(null)}>✕</button></div>
                  <div className="xpl-scroll">
                    <div className="xpl-sec">
                      {(() => { const sc = ddpeLinkScore(lo, hi) ?? d.link?.confidence;
                        return <div className="xpl-lbl">Attaches {sc != null ? `· ${Math.round(sc*100)}` : ""}</div>; })()}
                      <div className="xpl-txt">{renderExpl(d.link?.explanation)}</div>
                    </div>
                  </div>
                </div>
              );
            })()}
            {/* ── Claude RELATION explanation — centred in the viewport ── */}
            {relExpl && (() => {
              const [lo, hi] = relExpl.key.split(",").map(Number);
              const d = relExpl.data || {};
              const relCol = d.relation?.candidate ? (relColor(d.relation.candidate) || "var(--accent)") : "var(--accent)";
              const conf = ddpeRelScore(lo, hi, d.relation?.candidate) ?? d.relation?.confidence;
              return (
                <div className="xpl-callout centered" onClick={e => e.stopPropagation()}>
                  <div className="xpl-hd"><span className="xpl-spark">✦</span> Relation explanation
                    <span className="xpl-edge">{lo}→{hi}</span><span style={{flex:1}}></span>
                    <button className="rbtn" title="close" onClick={() => setRelExpl(null)}>✕</button></div>
                  <div className="xpl-scroll">
                    {(() => {
                      // Frame the panel on the relation the annotator ASKED about (opinion.suggested),
                      // with the model's verdict. On disagree the model's alternative is shown as
                      // "suggests instead" AFTER the rationale — not as the headline.
                      const asked = d.opinion?.suggested;
                      const verdict = d.opinion?.verdict;
                      const askCol = asked ? (relColor(asked) || "var(--accent)") : relCol;
                      const alt = d.relation?.candidate;
                      const showAlt = verdict === "disagree" && alt && alt !== asked;
                      return (
                        <div className="xpl-sec">
                          <div className="xpl-lbl">Relation
                            <span className="xpl-rel" style={{color: askCol, borderColor: askCol}}>
                              <span className="legend-sw" style={{background: askCol}}></span>{relFull(asked || alt)}</span>
                            {verdict === "agree" && <span className="xpl-verdict agree">✓ holds</span>}
                            {verdict === "disagree" && <span className="xpl-verdict disagree">✗ doesn’t hold</span>}
                            {verdict !== "disagree" && conf ? <span style={{color:"var(--fg-2)", fontWeight:400}}> · {Math.round(conf*100)}</span> : ""}
                          </div>
                          <div className="xpl-txt">{renderExpl(d.relation?.explanation)}</div>
                          {showAlt && (
                            <div className="xpl-suggests">→ suggests instead
                              <span className="xpl-rel" style={{color: relCol, borderColor: relCol}}>
                                <span className="legend-sw" style={{background: relCol}}></span>{relFull(alt)}</span>
                              {conf ? <span style={{color:"var(--fg-2)"}}>· {Math.round(conf*100)}</span> : ""}
                            </div>
                          )}
                        </div>
                      );
                    })()}
                  </div>
                </div>
              );
            })()}
            {/* ── COMBINED explanation (arc already has a relation): LINK + RELATION in
                  two expandable sections. ── */}
            {comboExpl && (() => {
              const [lo, hi] = comboExpl.key.split(",").map(Number);
              const ld = comboExpl.link || {}, rd = comboExpl.rel || {};
              const relCand = rd.relation?.candidate || comboExpl.chosen;
              const relCol = relCand ? (relColor(relCand) || "var(--accent)") : "var(--accent)";
              const linkSc = ddpeLinkScore(lo, hi) ?? ld.link?.confidence;
              const relSc = ddpeRelScore(lo, hi, relCand) ?? rd.relation?.confidence;
              return (
                <div className="xpl-callout centered" onClick={e => e.stopPropagation()}>
                  <div className="xpl-hd"><span className="xpl-spark">✦</span> Explanation
                    <span className="xpl-edge">{lo}→{hi}</span><span style={{flex:1}}></span>
                    <button className="rbtn" title="close" onClick={() => setComboExpl(null)}>✕</button></div>
                  <div className="xpl-scroll">
                    {/* LINK section */}
                    <div className="xpl-sec">
                      <button className="xpl-toggle" onClick={() => setComboTab(t => t === "link" ? null : "link")}>
                        <span className="xpl-caret">{comboTab === "link" ? "▾" : "▸"}</span>
                        Link <span style={{color:"var(--fg-2)", fontWeight:400}}>{linkSc != null ? `· ${Math.round(linkSc*100)}` : ""}</span>
                      </button>
                      {comboTab === "link" && <div className="xpl-txt" style={{marginTop:6}}>{renderExpl(ld.link?.explanation)}</div>}
                    </div>
                    {/* RELATION section — framed on the asked relation + verdict */}
                    {(() => {
                    const askedR = rd.opinion?.suggested || comboExpl.chosen;
                    const verdictR = rd.opinion?.verdict;
                    const askColR = askedR ? (relColor(askedR) || "var(--accent)") : relCol;
                    const showAltR = verdictR === "disagree" && relCand && relCand !== askedR;
                    return (
                    <div className="xpl-sec">
                      <button className="xpl-toggle" onClick={() => setComboTab(t => t === "rel" ? null : "rel")}>
                        <span className="xpl-caret">{comboTab === "rel" ? "▾" : "▸"}</span>
                        Relation {(askedR || relCand) && <span className="xpl-rel" style={{color: askColR, borderColor: askColR}}>
                          <span className="legend-sw" style={{background: askColR}}></span>{relFull(askedR || relCand)}</span>}
                        {verdictR === "agree" && <span className="xpl-verdict agree">✓ holds</span>}
                        {verdictR === "disagree" && <span className="xpl-verdict disagree">✗ doesn’t hold</span>}
                        {verdictR !== "disagree" && relSc != null && <span style={{color:"var(--fg-2)", fontWeight:400}}> · {Math.round(relSc*100)}</span>}
                      </button>
                      {comboTab === "rel" && <>
                        <div className="xpl-txt" style={{marginTop:6}}>{renderExpl(rd.relation?.explanation)}</div>
                        {showAltR && (
                          <div className="xpl-suggests">→ suggests instead
                            <span className="xpl-rel" style={{color: relCol, borderColor: relCol}}>
                              <span className="legend-sw" style={{background: relCol}}></span>{relFull(relCand)}</span>
                            {relSc != null ? <span style={{color:"var(--fg-2)"}}>· {Math.round(relSc*100)}</span> : ""}
                          </div>
                        )}
                      </>}
                    </div>
                    );
                    })()}
                  </div>
                </div>
              );
            })()}
        </div>{/* /canvas-col */}
        {/* ───────── DISCOURSE PATHS (right drawer) ───────── */}
        {threadsOpen && (
          <div className="threads-drawer" style={{width:"fit-content", minWidth:200, maxWidth:420}}>
            <div className="thr-hdr">
              <span className="title">Discourse paths</span>
              <span className="thr-count">{dagThreads.length}</span>
              <div style={{flex:1}}></div>
              <button className="btn ghost" onClick={extractDagThreads} disabled={busy || !arcs.length}
                      title="Extract maximal paths from the arc DAG">
                {busy === "dagThreads" ? <span className="spinner"></span> : "⎇"}
              </button>
              {dagThreads.length > 0 && (
                <button className="bulb bulb-sm tip" data-tip="label all paths with LLM"
                        onClick={labelAllDagPaths} disabled={busy || !dagThreads.length}>
                  {busy === "dagLabel" ? <span className="spinner"></span> :
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M9 18h6"/><path d="M10 22h4"/>
                      <path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/>
                    </svg>}
                </button>
              )}
              <button className="btn ghost" onClick={() => setThreadsOpen(false)} title="close">×</button>
            </div>
            <div className="thr-body">
              {dagThreads.length === 0 ? (
                <div className="thr-empty" style={{fontSize:"0.82em"}}>
                  Click ⎇ to extract maximal paths from the annotation DAG.
                </div>
              ) : dagThreads.map((t, ti) => {
                const col = THREAD_COLORS[ti % THREAD_COLORS.length];
                const isActive = activeDagPath === t;
                const isLocked = isActive && dagPathLocked;
                const lbl = dagLabels[ti];
                return (
                  <div key={ti}
                       className={`dag-thr-item${isActive ? " active" : ""}${isLocked ? " locked" : ""}`}
                       style={{"--tc": col}}
                       onMouseEnter={() => { if (!dagPathLocked) setActiveDagPath(t); }}
                       onMouseLeave={() => { if (!dagPathLocked) setActiveDagPath(null); }}
                       onClick={() => {
                         if (isLocked) { setDagPathLocked(false); setActiveDagPath(null); }
                         else { setActiveDagPath(t); setDagPathLocked(true); }
                       }}>
                    <div style={{display:"flex", alignItems:"center", gap:6, width:"100%"}}>
                      <span className="thr-dot" style={{background: col, flexShrink:0}}></span>
                      <span className="dag-path">
                        {t.path.map((n, i) => (
                          <React.Fragment key={i}>
                            {i > 0 && <span className="dag-arrow">→</span>}
                            <span className="dag-node"
                                  style={{color: spkColor[edus[n]?.speaker]}}
                                  title={edus[n] ? `${edus[n].speaker}: ${edus[n].text}` : String(n)}>
                              {n}
                            </span>
                          </React.Fragment>
                        ))}
                      </span>
                      <span className="thr-count" style={{flexShrink:0}}>L{t.level}</span>
                      <button className="bulb bulb-sm tip" style={{flexShrink:0}}
                              data-tip="label this path with the LLM"
                              onClick={e => { e.stopPropagation(); setActiveDagPath(t); setDagPathLocked(true); labelDagPath(ti); }}>
                        {lbl?.loading ? <span className="spinner"></span> :
                          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                               strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                            <path d="M9 18h6"/><path d="M10 22h4"/>
                            <path d="M15.09 14c.18-.98.65-1.74 1.41-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .23 2.23 1.5 3.5A4.61 4.61 0 0 1 8.91 14"/>
                          </svg>}
                      </button>
                    </div>
                  </div>
                );
              })}
              {/* ── expanded section (label + EDU sequence) for the locked path ── */}
              {dagPathLocked && activeDagPath && (() => {
                const ti = dagThreads.indexOf(activeDagPath);
                const col = ti >= 0 ? THREAD_COLORS[ti % THREAD_COLORS.length] : "var(--accent)";
                const lbl = dagLabels[ti];
                return (
                  <div className="dag-edu-seq" style={{"--tc": col}}>
                    <div className="dag-edu-seq-hdr">
                      <span className="thr-dot" style={{background: col}}></span>
                      <span style={{flex:1, fontSize:11, color:"var(--fg-2)", textTransform:"uppercase",
                                    letterSpacing:".05em"}}>path {ti + 1}</span>
                      <button className="btn ghost" style={{padding:"1px 4px", fontSize:10}}
                              onClick={() => { setDagPathLocked(false); setActiveDagPath(null); }}>✕</button>
                    </div>
                    {lbl && !lbl.loading && lbl.label && (
                      <div className="dag-lbl" title={lbl.summary} style={{marginBottom:6}}>
                        <b>{lbl.label}</b>
                        {lbl.summary && <div style={{color:"var(--fg-2)", fontSize:11, marginTop:2, whiteSpace:"normal"}}>{lbl.summary}</div>}
                      </div>
                    )}
                    {activeDagPath.path.map((n) => {
                      const e = edus[n];
                      if (!e) return null;
                      return (
                        <div key={n} className="dag-edu-row"
                             style={{"--spk": spkColor[e.speaker]}}
                             onClick={() => {
                               const el = nodeRefs.current[n];
                               if (el) el.scrollIntoView({block:"center", inline:"center", behavior:"smooth"});
                               setSelTarget(n);
                             }}>
                          <div className="raw-hd">
                            <b style={{color: spkColor[e.speaker]}}>{n}</b>
                            <b className="spk-name" style={{color: spkColor[e.speaker]}}>{e.speaker}</b>
                          </div>
                          <div className="raw-txt">{e.text}</div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
            </div>
          </div>
        )}
        {/* ── OVERLAY arrow (spans dialogue list + canvas): the CURRENT arc (selected or
              explained) drawn from the source row into the canvas, Bézier bulging right.
              DOM-anchored: endpoints from the list rows' rects minus the body-row rect. ── */}
        {(() => {
          void domTick;   // recompute on list scroll / resize
          const pair = selArc ? selArc
                     : (comboExpl || relExpl || linkExpl)
                       ? (comboExpl || relExpl || linkExpl).key.split(",").map(Number) : null;
          if (!pair) return null;
          const lo = Math.min(pair[0], pair[1]), hi = Math.max(pair[0], pair[1]);
          const cEl = bodyRowRef.current, aEl = rawRefs.current[lo], bEl = rawRefs.current[hi];
          if (!cEl || !aEl || !bEl) return null;
          const c = cEl.getBoundingClientRect(), a = aEl.getBoundingClientRect(), b = bEl.getBoundingClientRect();
          // skip if a row is scrolled out of the list viewport (rect collapsed/offscreen)
          const a2 = aEl.parentElement.getBoundingClientRect();
          const visible = y => y > a2.top - 4 && y < a2.bottom + 4;
          if (!visible(a.top + a.height / 2) && !visible(b.top + b.height / 2)) return null;
          // The dialogue list is ALWAYS a vertical column on the left, so the overlay arc
          // always exits the source row's RIGHT edge and bulges RIGHT into the canvas —
          // identical in both canvas orientations (horizontal-style curve).
          let S, E, d, mid;
          {
            S = { x: a.right - c.left, y: a.top - c.top + a.height / 2 };
            E = { x: b.right - c.left, y: b.top - c.top + b.height / 2 };
            const bulge = Math.max(120, Math.abs(E.y - S.y) * 0.6);
            d = `M ${S.x} ${S.y} C ${S.x + bulge} ${S.y}, ${E.x + bulge} ${E.y}, ${E.x} ${E.y}`;
            mid = { x: (S.x + E.x) / 2 + 0.75 * bulge, y: (S.y + E.y) / 2 };
          }
          const arcRel = arcs.find(r => Math.min(r.x,r.y)===lo && Math.max(r.x,r.y)===hi);
          // Mirror the auto-layout canvas rule: neutral GREY + dashed while no relation
          // is set, relation COLOUR + solid once one is selected (#9aa6b2 = canvas NOREL
          // grey). When a relation exists, label the arc at its mid-point.
          const hasRel = !!arcRel?.type;
          const col = hasRel ? (relColor(arcRel.type) || "var(--accent-sat)") : "#9aa6b2";
          const relName = hasRel ? relFull(arcRel.type) : "";
          const lw = relName.length * 7.4 + 18;
          return (
            <svg className="xarc-layer">
              <defs>
                <marker id="xarc-head" markerWidth="12" markerHeight="12" refX="8" refY="3"
                        orient="auto" markerUnits="strokeWidth">
                  <path d="M0,0 L8,3 L0,6" fill="none" stroke={col} strokeWidth="1.6" strokeLinecap="round"/>
                </marker>
              </defs>
              <path d={d} fill="none" stroke={col} strokeWidth="3" strokeLinecap="round"
                    strokeDasharray={hasRel ? "none" : "7,6"}
                    opacity="0.9" markerEnd="url(#xarc-head)"/>
              {hasRel && (
                <g transform={`translate(${mid.x}, ${mid.y})`}>
                  <rect x={-lw/2} y={-12} width={lw} height={24} rx={7}
                        style={{fill:"var(--bg-0)"}} stroke={col} strokeWidth={1.4}/>
                  <text x={0} y={5} textAnchor="middle" fontSize="13" fontWeight="700"
                        fill={col} style={{pointerEvents:"none"}}>{relName}</text>
                </g>
              )}
            </svg>
          );
        })()}
       </div>{/* /body-row */}

        {/* ───────── SIDE PANEL — only shown when there is media or an explanation
            (the "All arcs" table is gone; relations are labelled on the canvas). ───────── */}
        {explanation && (
        <div className={"side" + (sideCollapsed ? " collapsed" : "")}
             style={{height: sideCollapsed ? 38 : sideH}}>
          {!sideCollapsed && <div className="resize-y" onMouseDown={beginResize("side")} title="drag to resize"></div>}
          <div className="side-hdr">
            <button className="btn ghost" onClick={() => setSideCollapsed(c => !c)}
                    title={sideCollapsed ? "expand panel" : "collapse panel"}>{sideCollapsed ? "▴" : "▾"}</button>
            <span className="title">Explanation</span>
            <div style={{flex:1}}></div>
          </div>

          <div className="side-body">
            {/* Media panel removed — per-EDU clips (video/audio) now play IN THE
                CANVAS, on each node (see the node render). */}
            {/* Incremental walkthrough is now driven ON THE CANVAS: proposal arrows
                (accept ✓ / reject ✕) + an explanation callout beside the target EDU. */}

            {/* "Suggest parents" panel removed — superseded by the on-canvas
                incremental proposals (arrows + ✓/✗ chips with scores). */}

            {/* "All arcs" table removed — relations are now labelled on the canvas
                via the on-arc dropdown (select an arc → pick the relation). */}

            {explanation && (
              <div className="section wide">
                <h3><span>Explanation ({explanation.source}→{explanation.target})</span>
                    <span className="spacer"></span>
                    <button className="btn ghost" onClick={() => setExplanation(null)}>✕</button></h3>
                <div style={{fontSize:11, color:"var(--fg-1)", marginBottom:8}}>{explanation.verbalization}</div>
                {explanation.saliency?.length > 0 && (() => {
                  const mx = Math.max(...explanation.saliency.map(t => Math.abs(t.saliency)), 1e-6);
                  return (
                    <div style={{marginBottom:8}}>
                      <span style={{fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:".05em",
                                    padding:"1px 6px", borderRadius:4, background:"#064e3b", color:"#6ee7b7"}}>
                        faithful · occlusion saliency</span>
                      <div style={{display:"flex", flexWrap:"wrap", gap:4, marginTop:5}}>
                        {explanation.saliency.map(t => (
                          <span key={t.i} title={`Δscore ${t.saliency}`}
                                style={{padding:"2px 6px", borderRadius:5, fontSize:11, border:"1px solid var(--border-1)",
                                        background:`color-mix(in srgb, var(--accent) ${Math.round(Math.max(0,t.saliency)/mx*72)}%, var(--bg-1))`}}>
                            {t.token}</span>
                        ))}
                      </div>
                    </div>
                  );
                })()}
                {explanation.contrastive && (
                  <div style={{padding:"7px 9px", background:"var(--bg-1)", borderRadius:8, borderLeft:"3px solid #a78bfa"}}>
                    <span style={{fontSize:9, fontWeight:700, textTransform:"uppercase", letterSpacing:".05em",
                                  padding:"1px 6px", borderRadius:4, background:"#2e1065", color:"#c4b5fd"}}>
                      plausible · model rationale (not faithful)</span>
                    <div style={{fontSize:12, fontWeight:700, margin:"5px 0"}}>
                      {(explanation.contrastive.relations || []).join("  vs  ")}</div>
                    <div style={{fontSize:11, color:"var(--fg-1)"}}>{explanation.contrastive.justification}</div>
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
        )}
      </div>

      <div className="status-bar">
        <span>{busy && <span className="spinner"></span>} {status}</span>
        <div style={{flex:1}}></div>
        {study && isExperimenter && <>
          <span className="badge" style={{background:"#3b2e0a", color:"var(--accent-l)"}}>STUDY {study.step+1}/{study.plan.length} · {COND_LABEL[study.plan[study.step]?.cond]||""}</span>
          <span>·</span>
        </>}
        {dial?.media && <><span style={{color:"var(--accent)"}}>multimodal</span><span>·</span></>}
        <span>Esc=clear · Del=remove arc · Ctrl+S=save · Ctrl+drag on canvas=pan</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
