<style>
* { margin:0; padding:0; box-sizing:border-box; }
/* ── THEME TOKENS ───────────────────────────────── dark = default, .light = override */
:root {
  --bg-0:#0a0e1a; --bg-1:#111827; --bg-2:#0d1424; --bg-3:#0f1929;
  --border-0:#374151; --border-1:#1f2937;
  --fg-0:#e5e7eb; --fg-1:#9ca3af; --fg-2:#6b7280; --fg-3:#4b5563;
  --node-fg:#f3f4f6; --row-sel:#1e2a44; --row-sug:#2a2009; --grid:#111827;
  --card:#1a2336;
  --accent:#577f72; --accent-d:#496b60; --accent-l:#7fa295; --accent-rgb:87,127,114; --accent-sat:hsl(162,30%,42%);
  --hairline:#27324a; --ink:#e9edf6;
}
body.light {
  /* COLD but COLORFUL pastel — soft periwinkle / cornflower (cool, not grey, not warm) */
  --bg-0:hsl(225 55% 99%); --bg-1:#e3e8fa; --bg-2:#d6def5; --bg-3:#c7d2f0;
  --border-0:#bcc8ec; --border-1:#dce2f7;
  --fg-0:#2a3148; --fg-1:#545f85; --fg-2:#838fb4; --fg-3:#a7b0d3;
  --node-fg:#232a40; --row-sel:#d6e0fc; --row-sug:#e1e6fb; --grid:#dde3f7;
  /* --accent / -d / -l / -rgb intentionally NOT redeclared here — they live in :root
     and are overridden live on <html> by the colour picker (a body-level redeclare
     would shadow that and break real-time re-theming). */
  --accent-2:#5f9ea0;      /* muted teal */
  --card:#ffffff;
  --hairline:#cdd6e8;      /* thin structural rules */
  --ink:#23304a;           /* deep cool slate-navy (not pure black) */
}
html,body,#root { height:100%; overflow:hidden; }
/* Aesthetic: a computational-linguistics experiment, not a dev tool —
   serif body (Source Serif 4); pastel light theme. */
/* Render ONLY the '?' glyph (U+003F) from a clean sans — the serif/Georgia '?' read
   oddly — while ALL other characters stay serif. (unicode-range font fallback trick.) */
@font-face { font-family:'QmarkSans'; src:local('Segoe UI'),local('Arial'),local('Helvetica Neue'),local('Roboto');
        unicode-range:U+003F; }
:root { --mono:'JetBrains Mono',ui-monospace,monospace;
        --serif:'QmarkSans','Source Serif 4',Georgia,'Iowan Old Style','Palatino Linotype',serif;
        --display:'QmarkSans','Source Serif 4',Georgia,'Palatino Linotype',serif; }
body { background:var(--bg-0); color:var(--fg-0);
       font-family:var(--serif);
       font-size:14px; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
/* display serif for brand + section labels + headings */
.brand, .lbl, .title, .side-hdr .title, .thr-hdr .title, h1, h3, h4,
.legend-hd, .nm-hdr, .pco-hdr .t, .cb-arc { font-family:var(--display); letter-spacing:.01em; }
button,select,input { font-family:inherit; }
pre, .mono { font-family:var(--mono); }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-track { background:var(--bg-2); }
::-webkit-scrollbar-thumb { background:var(--border-0); border-radius:3px; }

.app { height:100vh; display:flex; flex-direction:column; }

/* ── Header ─────────────────────────────────────── */
.hdr { background:var(--bg-1); border-bottom:1px solid var(--hairline);
       display:flex; align-items:center; padding:1em 2em; gap:10px; flex-shrink:0; }
/* Signature wordmark: a discourse relation (o→A) arcs over the name, echoing the
   canvas. The arc IS the brand — everything else around it stays quiet. */
.brand { position:relative; display:inline-flex; align-items:baseline; margin-right:18px;
         font-family:var(--display); font-weight:700; font-size:21px; letter-spacing:.01em;
         color:var(--ink, var(--fg-0)); user-select:none; }
.brand { font-size:1.6em; }
.brand .b-co { color:var(--ink, var(--fg-0)); }
.brand .b-da { color:var(--accent-sat, var(--accent)); }
.brand-arc { position:absolute; left:14px; right:6px; top:-9px; height:12px; overflow:visible; pointer-events:none; }
.brand-arc path { fill:none; stroke:var(--accent-sat, var(--accent)); stroke-width:1.8; }
.brand-arc circle { fill:var(--accent-sat, var(--accent)); }
.hdr .title { font-weight:700; color:var(--accent); margin-right:14px; }
.hdr select, .hdr input {
  padding:7px 12px; background:var(--bg-0); border:1px solid var(--border-0);
  border-radius:10px; color:var(--fg-0); font-size:13px; outline:none; cursor:pointer;
  transition:border-color .12s, box-shadow .12s; box-shadow:0 1px 2px rgba(40,55,80,.04); }
.hdr select:hover, .hdr input:hover { border-color:var(--accent); }
.hdr select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.15); }
.hdr .spacer { flex:1; }

/* smoother, softer buttons (rounded, subtle depth) */
.btn { padding:7px 14px; border:1px solid var(--border-0); border-radius:10px; background:var(--bg-0);
       color:var(--fg-0); font-size:13px; font-weight:600; cursor:pointer;
       transition:border-color .12s, color .12s, background .12s, box-shadow .12s, transform .06s;
       white-space:nowrap; box-shadow:0 1px 2px rgba(40,55,80,.05); }
.btn:hover { border-color:var(--accent); color:var(--accent); box-shadow:0 2px 8px rgba(40,55,80,.10); }
.btn:active { transform:translateY(1px); }
.btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 8px rgba(var(--accent-rgb),.30); }
.btn.primary:hover { background:var(--accent-d); color:#fff; }
.btn.danger { color:#d97777; border-color:#e3b9b9; }
.btn.ghost { border-color:transparent; color:var(--fg-1); padding:6px 10px; box-shadow:none; }
.btn.ghost:hover { color:var(--accent); background:var(--bg-2); }
.btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.btn:disabled { opacity:.4; cursor:not-allowed; }

.badge { padding:2px 7px; border-radius:3px; font-size:11px; font-weight:700; text-transform:uppercase; }
.badge.ok { background:#064e3b; color:#6ee7b7; }
.badge.new { background:#3b2e0a; color:var(--accent-l); }
.badge.dirty { background:#3b1515; color:#f87171; }

/* ── Body layout ────────────────────────────────── */
.body { flex:1; min-height:0; display:flex; flex-direction:column; overflow:hidden; }
.canvas-col { flex:1; min-width:0; display:flex; flex-direction:column; overflow:hidden; position:relative; }
/* C4: relation→color legend (floating, toggleable) */
.legend { position:absolute; top:54px; right:14px; z-index:7; width:300px; max-height:62%;
        overflow-y:auto; background:var(--bg-1); border:1px solid var(--border-0); border-radius:10px;
        box-shadow:0 8px 24px rgba(0,0,0,.42); padding:9px 11px; }
.legend-hd { display:flex; align-items:center; gap:6px; font-size:10.5px; text-transform:uppercase;
        letter-spacing:.06em; color:var(--fg-2); font-weight:700; margin-bottom:7px; }
.legend-row { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--fg-1); padding:2.5px 0; }
.legend-sw { width:16px; height:7px; border-radius:3px; flex-shrink:0; }
/* #26 relation codebook — LARGE right overlay */
.codebook { position:absolute; top:64px; right:18px; bottom:18px; z-index:22; width:560px; max-width:46vw;
        overflow-y:auto; background:var(--bg-1); border:1px solid var(--border-0); border-radius:14px;
        box-shadow:0 20px 60px rgba(0,0,0,.6); padding:16px 20px; }
/* docked: a slim right-hand panel flush to the edge (not a floating overlay) */
.codebook.docked { top:0; right:0; bottom:0; width:440px; max-width:40vw; border-radius:0;
        border:none; border-left:1px solid var(--border-0); box-shadow:-8px 0 24px rgba(40,55,80,.10);
        padding:14px 16px; }
.cb-sub { font-size:13px; color:var(--fg-2); font-style:italic; margin:2px 0 10px; line-height:1.35; }
.cb-arc { font-size:16px; color:var(--accent, #6f86b3); font-weight:700; text-transform:none; letter-spacing:0; }
.cb-row { padding:9px 11px; border-radius:9px; cursor:pointer; border:1px solid var(--border-1);
        border-left:5px solid transparent; margin-bottom:6px; background:var(--bg-0); transition:transform .1s; }
.cb-row:hover { transform:translateX(-2px); border-color:var(--accent, #6f86b3); }
.cb-row.cur { background:var(--row-sel); outline:2px solid var(--accent, #6f86b3); }
.cb-name { display:flex; align-items:center; flex-wrap:wrap; gap:6px 9px; font-size:16px; font-weight:700; color:var(--fg-0); }
.cb-cur { margin-left:auto; font-size:12px; color:var(--accent, #6f86b3); font-weight:800; white-space:nowrap; }
.cb-prob { margin-left:auto; font-size:13px; font-weight:800; color:var(--fg-1);
        background:var(--bg-2); border-radius:8px; padding:1px 7px; }
.cb-def { font-size:14px; color:var(--fg-1); margin:5px 0 3px 26px; line-height:1.4; }
.cb-ex-toggle { margin:2px 0 0 26px; padding:0; background:none; border:none; cursor:pointer;
        font-size:12px; font-weight:700; color:var(--accent); letter-spacing:.02em; }
.cb-ex-toggle:hover { text-decoration:underline; }
.cb-ex { font-size:15px; color:var(--fg-0); margin:3px 0 2px 28px; line-height:1.45; font-style:italic; }
.cb-no { font-size:11px; color:#f87171; margin-left:24px; line-height:1.35; }
/* raw dialogue drawer rows */
/* EDU cards: lighter than the panel + soft shadow → clear tonal separation */
.raw-edu { border:1px solid var(--border-0); border-left:5px solid var(--spk,#888); border-radius:10px;
        background:var(--card); padding:9px 12px; cursor:pointer;
        box-shadow:0 2px 6px rgba(40,55,80,.10); transition:box-shadow .12s, transform .06s; }
.raw-edu:hover { box-shadow:0 4px 12px rgba(40,55,80,.16); transform:translateX(1px); }
.raw-edu.sel { border-color:var(--accent); box-shadow:0 0 0 2px rgba(var(--accent-rgb),.45), 0 2px 8px rgba(40,55,80,.14); }
.raw-edu.expl-hi { border-color:var(--accent); box-shadow:0 0 0 2px var(--accent), 0 4px 14px rgba(40,55,80,.20); }
.raw-edu.cur { box-shadow:0 0 0 2px rgba(var(--accent-rgb),.55); }
.raw-hd { display:flex; gap:7px; font-size:18px; font-weight:700; margin-bottom:2px; }
.raw-txt { font-size:18px; color:var(--fg-0); line-height:1.45; }
/* app loading screen: MuDiPA logo with a circular spinner orbiting it */
.app-loading { position:fixed; inset:0; z-index:300; display:flex; align-items:center; justify-content:center; background:var(--bg-0); }
.app-loading-orbit { position:relative; width:140px; height:140px; display:flex; align-items:center; justify-content:center; }
.app-loading-orbit::before { content:""; position:absolute; top:0; left:0; width:140px; height:140px; box-sizing:border-box;
        border-radius:50%; border:4px solid color-mix(in srgb, var(--accent) 16%, transparent); border-top-color:var(--accent);
        animation:mudipa-spin .8s linear infinite; }
@keyframes mudipa-spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
@media (prefers-reduced-motion: reduce) { .app-loading-orbit::before { animation:none; } }
/* account button (round avatar, top-right) + popover */
.acct-wrap { position:relative; display:inline-flex; }
.acct-btn { width:32px; height:32px; border-radius:50%; border:none; cursor:pointer;
        background:var(--accent); color:#fff; font-weight:800; font-size:12px; letter-spacing:.02em;
        display:inline-flex; align-items:center; justify-content:center; }
.acct-btn:hover { filter:brightness(1.08); }
.acct-menu { position:absolute; top:40px; right:0; z-index:210; background:var(--card);
        border:1px solid var(--border-0); border-radius:10px; box-shadow:0 8px 24px rgba(40,55,80,.30);
        padding:12px; min-width:190px; display:flex; flex-direction:column; gap:10px; }
.acct-id { font-size:12px; color:var(--fg-2); line-height:1.6; }
.acct-id b { color:var(--accent); font-family:var(--mono); font-size:14px; }
/* settings panel (floating) */
.settings { position:absolute; top:0; right:1em; z-index:200; width:340px; height:fit-content; max-height:85vh;
        overflow-y:auto; background:var(--bg-1);
        border:1px solid var(--border-0); border-radius:10px; box-shadow:0 8px 24px rgba(40,55,80,.30); padding:11px 13px; }
.settings h4 { font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--fg-2); margin-bottom:9px;
        display:flex; align-items:center; }
.settings label { font-size:12.5px; color:var(--fg-1); display:block; margin-bottom:5px; }
.settings input[type=range] { width:100%; accent-color:var(--accent); }
/* animated tutorial coach-card (floats over the sample, which stays interactive) */
.tut-card { position:fixed; right:24px; bottom:24px; z-index:120; width:340px; max-width:90vw;
        background:var(--card); border:1px solid var(--accent); border-radius:14px; padding:16px 18px;
        box-shadow:0 14px 40px rgba(40,55,80,.30), 0 0 0 4px rgba(var(--accent-rgb),.12); }
.tut-step { font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--accent); }
.tut-title { font-family:var(--display); font-size:17px; font-weight:700; margin:3px 0 6px; }
.tut-body { font-size:13px; line-height:1.55; color:var(--fg-1); }
.tut-acts { display:flex; align-items:center; gap:8px; margin-top:14px; }
/* guided-study progress bar */
.study-bar { flex-shrink:0; display:flex; align-items:center; gap:14px; padding:8px 16px;
        background:color-mix(in srgb, var(--accent) 12%, var(--card)); border-bottom:1px solid var(--hairline);
        font-size:13px; color:var(--fg-0); }
.study-bar .study-prog { font-weight:700; }
.study-bar .study-prog b { color:var(--accent); }
/* study progress + controls embedded in the header bar */
.hdr-study { display:inline-flex; align-items:center; gap:10px; margin-left:14px; }
.hdr-study .study-prog { font-size:13px; font-weight:700; white-space:nowrap; }
.hdr-study .study-prog b { color:var(--accent); }
.study-bar .study-hint { color:var(--fg-2); font-size:12px; }
/* auth gate (login / first-time profile) */
.auth-screen { position:fixed; inset:0; z-index:200; display:flex; align-items:center; justify-content:center;
        background:var(--bg-0); }
.auth-card { width:380px; max-width:90vw; max-height:92vh; overflow-y:auto; background:var(--card);
        border:1px solid var(--hairline); border-radius:16px; padding:28px 26px;
        box-shadow:0 18px 50px rgba(40,55,80,.22); display:flex; flex-direction:column; }
.auth-card.wide { width:440px; }
.auth-brand { font-family:var(--display); font-size:2em; font-weight:800; letter-spacing:-.01em; margin-bottom:2px; }
.auth-brand .b-da { color:var(--accent-sat, var(--accent)); }
.auth-sub { color:var(--fg-2); font-size:13px; margin-bottom:16px; }
.auth-lbl { font-size:12px; font-weight:700; color:var(--fg-1); margin:9px 0 3px; }
.auth-err { color:#d9534f; font-size:12.5px; margin-top:9px; font-weight:600; }
.auth-foot { color:var(--fg-3); font-size:11px; margin-top:14px; line-height:1.4; }
.admin-page { display:flex; flex-direction:column; height:100vh; background:var(--bg-0); }
.admin-hdr { display:flex; align-items:center; gap:12px; padding:10px 20px; background:var(--bg-1); border-bottom:1px solid var(--border-0); flex-shrink:0; }
.admin-body { display:flex; flex:1; overflow:hidden; }
.admin-sidebar { width:240px; flex-shrink:0; border-right:1px solid var(--border-0); overflow-y:auto; background:var(--bg-1); }
.admin-main { flex:1; overflow:hidden; display:flex; flex-direction:column; padding:16px; gap:12px; }
.admin-sidebar-section { padding:8px 12px 4px; font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--fg-2); font-weight:700; }
.admin-sidebar-item { padding:7px 14px; cursor:pointer; font-size:12.5px; color:var(--fg-1); border-left:3px solid transparent; }
.admin-sidebar-item:hover { background:var(--bg-2); }
.admin-sidebar-item.active { border-left-color:var(--accent); color:var(--fg-0); font-weight:700; background:var(--bg-2); }
.admin-compare { display:flex; flex:1; gap:12px; overflow:hidden; }
.admin-compare.stack { flex-direction:column; }
.admin-arcview { display:flex; flex-direction:column; flex:1; min-height:0; border:1px solid var(--border-0); border-radius:8px; overflow:hidden; }
.admin-arcview-hdr { padding:6px 12px; background:var(--bg-2); font-size:12px; font-weight:700; border-bottom:1px solid var(--border-0); display:flex; align-items:center; gap:8px; }
.admin-arcview-body { flex:1; overflow-y:auto; background:var(--bg-0); }
.admin-stats { display:flex; gap:8px; flex-wrap:wrap; }
.admin-stat { background:var(--bg-2); border-radius:6px; padding:4px 10px; font-size:12px; }
.admin-stat b { color:var(--accent); }
/* Admin dashboard */
.admin-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:60; display:flex; align-items:center; justify-content:center; }
.admin-panel { width:min(960px,96vw); max-height:88vh; overflow-y:auto; background:var(--bg-1); border:1px solid var(--border-0); border-radius:14px; padding:28px 32px; }
.admin-panel h3 { font-size:17px; font-weight:700; margin:0 0 18px; display:flex; align-items:center; gap:10px; }
.admin-tbl { width:100%; border-collapse:collapse; font-size:12.5px; }
.admin-tbl th { text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--fg-2); padding:4px 10px 8px; border-bottom:1px solid var(--border-0); white-space:nowrap; }
.admin-tbl td { padding:7px 10px; border-bottom:1px solid var(--border-0); color:var(--fg-1); vertical-align:top; }
.admin-tbl tr:last-child td { border-bottom:none; }
.admin-tbl .pid { font-family:var(--mono); font-weight:700; color:var(--fg-0); }
.admin-cond { display:inline-block; background:var(--bg-2); border-radius:6px; padding:2px 7px; font-size:11px; margin:1px 2px; }
.admin-pill { display:inline-block; border-radius:6px; padding:2px 8px; font-size:11px; font-weight:700; }

/* S1/S2/S3/S7 study panel + questionnaire */
.settings.study { width:368px; right:14px; z-index:46; }
.study-in { width:100%; box-sizing:border-box; background:var(--bg-2); color:var(--fg-0);
        border:1px solid var(--border-1); border-radius:6px; padding:5px 8px; font-size:12.5px; }
.study-warn { font-size:10.5px; color:var(--accent); margin:6px 0; line-height:1.3; }
.raw-badge { background:#ef4444; color:#fff; font-size:10px; font-weight:800; letter-spacing:.08em;
        padding:2px 7px; border-radius:5px; margin-left:6px; }
.quiz-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:50;
        display:flex; align-items:center; justify-content:center; }
.quiz { width:720px; max-height:88vh; overflow-y:auto; background:var(--bg-1); border:1px solid var(--border-0);
        border-radius:14px; box-shadow:0 20px 60px rgba(0,0,0,.6); padding:18px 22px; }
.quiz h3 { display:flex; align-items:center; font-size:16px; margin:0 0 8px; color:var(--fg-0); }
.quiz h4 { font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--fg-2); margin:14px 0 8px; }
.quiz-row { font-size:12.5px; color:var(--fg-1); margin-bottom:9px; }
.quiz-row > span { display:block; margin-bottom:4px; }
.quiz-row input[type=range] { width:100%; accent-color:var(--accent); }
.quiz-row.sus { display:flex; align-items:center; gap:10px; }
.quiz-row.sus > span { flex:1; margin:0; }
.sus-scale { display:flex; gap:4px; flex-shrink:0; }
.sus-b { width:26px; height:26px; border-radius:6px; border:1px solid var(--border-1); background:var(--bg-2);
        color:var(--fg-1); cursor:pointer; font-size:12px; }
.sus-b.on { background:var(--accent); color:#04222e; border-color:var(--accent); font-weight:700; }

/* Toolbar above canvas */
.toolbar { min-height:54px; flex-shrink:0; background:var(--bg-1); border-bottom:1px solid var(--hairline);
           display:flex; align-items:center; flex-wrap:wrap; padding:0.5em 1.5em; gap:1.25em; font-size:20px;
           position:relative; z-index:21; }
/* faded focus scrim over the canvas content (in canvas coords → covers everything as
   you scroll); the explained arc is drawn ON TOP via .canvas-spotlight */
/* full-viewport fade over the canvas column (covers the WHOLE visible canvas in real
   time, regardless of content size / scroll / zoom). The dialogue list stays visible. */
.canvas-scrim { position:absolute; inset:0; z-index:24; cursor:pointer;
           background:color-mix(in srgb, var(--ink) 40%, transparent); }
.canvas-spotlight { position:absolute; left:0; top:0; z-index:16; pointer-events:none; overflow:visible; }
/* eyebrow labels — small, letter-spaced, display face; they name a region, quietly */
.toolbar .lbl { color:var(--fg-2); text-transform:uppercase; letter-spacing:.13em;
           font-weight:700; font-size:11px !important; margin-right:5px; font-family:var(--display); }
.toolbar .hint { color:var(--fg-2); font-size:12.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
/* Gestalt: group related controls (proximity) + thin separators (common region) */
.tb-group { display:flex; align-items:center; gap:5px; }

/* ── Load + navigation control clusters (dataset / split / dialogue nav) ──
   Two labelled segmented groups so the toolbar reads as "what to load" then
   "where to go", in MuDiPA's teal accent. */
.tb-cluster { display:inline-flex; align-items:center; gap:8px; }
.tb-eyebrow { font-family:var(--display); font-size:10px; font-weight:700; letter-spacing:.14em;
              text-transform:uppercase; color:var(--fg-3); }
.seg-group { display:inline-flex; align-items:center; gap:2px; background:var(--bg-0);
             border:1px solid var(--border-1); border-radius:11px; padding:2px; }
.seg-group .seg { border:none; background:transparent; color:var(--fg-1); font:inherit; font-size:13px;
                  line-height:1; padding:6px 12px; border-radius:9px; cursor:pointer; white-space:nowrap;
                  display:inline-flex; align-items:center; gap:5px; transition:background .12s, color .12s; }
.seg-group .seg:hover:not(:disabled) { color:var(--accent); background:var(--bg-2); }
.seg-group .seg.on { background:var(--accent); color:#fff; box-shadow:0 1px 4px rgba(var(--accent-rgb),.35); }
.seg-group .seg:disabled { opacity:.35; cursor:not-allowed; }
.nav-sel { border:none; background:transparent; color:var(--fg-0); font:inherit; font-size:13px;
           font-weight:600; padding:6px 8px; cursor:pointer; text-align:center; min-width:118px; }
.nav-sel:focus { outline:none; }

/* dataset trigger + faceted popover */
.ds-trigger { display:inline-flex; align-items:center; gap:8px; padding:6px 13px; border-radius:11px;
              border:1px solid var(--border-0); background:var(--bg-0); color:var(--fg-0); font:inherit;
              font-size:13px; font-weight:600; cursor:pointer; transition:border-color .12s; }
.ds-trigger:hover { border-color:var(--accent); }
.ds-trigger .dot { width:7px; height:7px; border-radius:50%; background:var(--accent); flex-shrink:0;
                   box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent); }
.ds-trigger .caret { color:var(--fg-2); font-size:11px; margin-left:1px; }
.ds-pop { position:absolute; top:100%; left:0; margin-top:7px; z-index:41; background:var(--bg-1);
          border:1px solid var(--border-0); border-radius:16px; padding:13px 14px; min-width:390px;
          max-width:600px; max-height:72vh; overflow:auto; box-shadow:0 18px 48px rgba(20,28,45,.30); }
.ds-sec { font-family:var(--display); font-size:9.5px; font-weight:800; letter-spacing:.15em;
          text-transform:uppercase; color:var(--accent-l); margin:14px 3px 7px; }
.ds-sec:first-child { margin-top:0; }
.ds-sec b { color:var(--fg-2); font-weight:800; }
.ds-grid { display:flex; flex-wrap:wrap; gap:6px; }
.ds-chip { padding:6px 13px; border-radius:999px; font-size:13px; cursor:pointer; white-space:nowrap;
           border:1px solid var(--border-1); background:var(--bg-0); color:var(--fg-1);
           transition:all .12s; }
.ds-chip:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-1px);
                 box-shadow:0 3px 10px rgba(var(--accent-rgb),.16); }
.ds-chip.on { background:var(--accent); color:#fff; border-color:var(--accent);
              box-shadow:0 2px 9px rgba(var(--accent-rgb),.34); }
.ds-div { height:1px; background:var(--border-1); margin:13px 0 3px; }
.tb-sep { width:1px; height:20px; background:var(--hairline); flex-shrink:0; }

/* Canvas */
.canvas-wrap { flex:1; position:relative; overflow:hidden; background:var(--bg-0);
               background-image:
                 linear-gradient(var(--grid) 1px, transparent 1px),
                 linear-gradient(90deg, var(--grid) 1px, transparent 1px);
               background-size:30px 30px; }
.canvas-wrap.panning { cursor:grabbing; }
/* infinite pan layer — translated by (pan.x, pan.y); the canvas can move freely in every
   direction (Ctrl/⌘ + drag). Sits OUTSIDE the canvas's CSS zoom, so panning is in screen px. */
.pan-layer { position:absolute; top:0; left:0; will-change:transform; }
/* custom scrollbars over the pan-by-translate canvas */
.cv-scroll { position:absolute; z-index:28; pointer-events:none; }
.cv-scroll.h { left:0; right:0; bottom:3px; height:9px; }
.cv-scroll.v { top:0; bottom:0; right:3px; width:9px; }
.cv-thumb { position:absolute; pointer-events:auto; cursor:grab; border-radius:6px;
        background:color-mix(in srgb, var(--ink) 26%, transparent); transition:background .12s; }
.cv-thumb:hover { background:color-mix(in srgb, var(--ink) 46%, transparent); }
.cv-scroll.h .cv-thumb { top:0; bottom:0; }
.cv-scroll.v .cv-thumb { left:0; right:0; }
.canvas { position:relative; width:3000px; height:3000px; }
/* ONLY the canvas's own full-bleed SVG layers (arcs / spotlight) — NOT inline icon
   SVGs nested in pickers/buttons, which would otherwise be stretched to fill. */
.canvas > svg { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
/* zoom controls — overlay pinned to the bottom-right of the canvas column */
.zoom-ctl { position:absolute; bottom:16px; right:16px;
            z-index:20; display:flex; flex-direction:column; gap:0; width:38px;
            border:1px solid var(--hairline); border-radius:10px; overflow:hidden;
            background:var(--card); box-shadow:0 4px 14px rgba(40,55,80,.16); }
.zoom-ctl button { border:none; background:var(--card); color:var(--fg-0); cursor:pointer;
            height:34px; font-size:18px; font-weight:700; line-height:1;
            border-bottom:1px solid var(--hairline); }
.zoom-ctl button:last-child { border-bottom:none; }
.zoom-ctl button:hover { background:var(--bg-2); color:var(--accent); }
.zoom-ctl .zc-val { font-size:11px; font-weight:700; color:var(--fg-2); }
.canvas svg path.arc { pointer-events:stroke; cursor:pointer; }
.canvas svg path.arc:hover { stroke-width:3.5; }

/* Node */
.node { position:absolute; width:fit-content; max-width:480px;
        background:var(--card);
        border:1px solid var(--border-1);
        border-left:7px solid var(--spk);
        border-radius:20px; padding:13px 18px 15px 17px;
        cursor:grab; user-select:none;
        transition:border-color .15s, box-shadow .15s, transform .1s, left .28s ease, top .28s ease, opacity .2s;
        box-shadow:0 6px 20px rgba(40,55,80,.12); }
/* suppress the position transition while actively dragging a node */
.node.dragging { transition:border-color .15s, box-shadow .15s; }
.node:hover { border-color:var(--border-0); }
.node.selected { border-color:var(--accent); box-shadow:0 0 0 2px rgba(var(--accent-rgb),.2); }
.node.parent { border-color:#10b981; box-shadow:0 0 0 2px rgba(16,185,129,.2); }
.node.arc-src { border-color:#a78bfa; box-shadow:0 0 0 2px rgba(167,139,250,.3); }
.node.incr-target { border-color:var(--accent); box-shadow:0 0 0 3px rgba(var(--accent-rgb),.4), 0 0 12px rgba(var(--accent-rgb),.4); animation:pulse 1.5s ease-in-out infinite; }
.node.incr-locked { opacity:.45; }
.node.dragging { cursor:grabbing; opacity:.9; z-index:10; }
@keyframes pulse { 0%,100% { box-shadow:0 0 0 3px rgba(var(--accent-rgb),.4), 0 0 12px rgba(var(--accent-rgb),.4); }
                   50%   { box-shadow:0 0 0 3px rgba(var(--accent-rgb),.6), 0 0 18px rgba(var(--accent-rgb),.6); } }
/* node header/body sized to content + font in em, matching the dialogue panel (.raw-hd/.raw-txt) */
.node-hdr { display:flex; gap:6px; align-items:center; margin-bottom:5px; width:fit-content; font-size:0.9em; }
.node-idx { font-weight:700; min-width:18px; }
.node-spk { font-weight:600; letter-spacing:.01em; }
/* speaker names rendered UPPERCASE everywhere (display only; keys unaffected) */
.node-spk, .spk-name, .ex-spk { text-transform:uppercase; }
.node-thread { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.node-txt { color:var(--node-fg); line-height:1.55;
            word-break:break-word; max-height:160px; overflow:hidden;
            font-weight:400; letter-spacing:.005em; margin-top:3px; width:fit-content; max-width:100%; }

/* ── On-canvas incremental proposals ────────────────────────────────────── */
/* proposal arrowheads + arc strokes carry a distinct PROPOSAL color (amber),
   alternatives are fainter/dashed — so suggestions never look committed. */
.canvas svg path.arc-prop { pointer-events:stroke; cursor:pointer; }
/* manual-first candidate arcs: faint by default, illuminate + thicken on hover */
.canvas svg path.arc-cand { pointer-events:stroke; cursor:pointer; transition:opacity .12s, stroke-width .12s; }
.canvas svg path.arc-cand:hover { opacity:1 !important; stroke-width:3.4 !important;
        filter:drop-shadow(0 0 4px rgba(251,191,36,.9)); }
/* ✨ score button in the candidate callout */
.pc-spark { background:transparent; border:1px solid var(--border-1); border-radius:6px; cursor:pointer;
        font-size:13px; padding:1px 6px; filter:saturate(.35) opacity(.85); }
.pc-spark:hover { filter:none; border-color:var(--accent); }
/* C5 de-validation cascade */
.node.flagged { box-shadow:0 0 0 2px var(--accent), 0 2px 10px rgba(var(--accent-rgb),.35); }
.node-reconfirm { margin-left:auto; background:transparent; color:var(--fg-0); border:none; border-radius:5px;
        font-size:11px; font-weight:700; padding:1px 4px; cursor:pointer; white-space:nowrap;
        display:inline-flex; align-items:center; gap:4px; }
.node-reconfirm:hover { color:#000; text-decoration:underline; }
.node-reconfirm .warn-ico { color:#e0a020; font-size:13px; }   /* warning yellow ⚠ only */
/* lightbulb (parser suggestions) — deep amber, distinct from the primary */
.bulb { background:#e0920f; color:#fff; border:none; cursor:pointer;
        display:inline-flex; align-items:center; justify-content:center;
        box-shadow:0 2px 8px rgba(224,146,15,.45); transition:transform .1s, background .1s; }
.bulb:hover { background:#c47d0a; transform:scale(1.1); }
.bulb:disabled { opacity:.6; cursor:default; }
.node-bulb { position:absolute; top:-13px; right:-13px; width:30px; height:30px; border-radius:50%;
        border:2px solid var(--card); box-shadow:0 3px 10px rgba(224,146,15,.5); }
/* compact connect-icon button (replaces the old "Collega" panel) */
.connect-btn { position:absolute; z-index:13; width:32px; height:32px; border-radius:50%;
        transform:translate(-50%,-50%);   /* centre on the arc point */
        display:flex; align-items:center; justify-content:center; cursor:pointer;
        background:var(--accent); color:#fff; border:2px solid var(--card);
        box-shadow:0 3px 10px rgba(var(--accent-rgb),.5); transition:transform .1s, background .1s; }
.connect-btn:hover { background:var(--accent-d); transform:translate(-50%,-50%) scale(1.12); }
/* on-bulb-in-picker — square-ish small button */
.bulb-sm { width:30px; height:26px; border-radius:8px; padding:0; }
/* styled tooltip (replaces native title) — don't force relative on .node-bulb,
   which is absolutely positioned on the node corner (would break its placement). */
/* .tip:not(.node-bulb) { position:relative; }  -- removed per request */
.tip::after { content:attr(data-tip); position:absolute; bottom:calc(100% + 9px); left:50%; transform:translateX(-50%) translateY(3px);
        background:var(--ink); color:var(--card); font-family:var(--display); font-size:12px; font-weight:600; letter-spacing:.01em;
        padding:5px 10px; border-radius:8px; white-space:nowrap; opacity:0; pointer-events:none;
        transition:opacity .12s ease, transform .12s ease; box-shadow:0 6px 16px rgba(40,55,80,.28); z-index:60; }
.tip::before { content:""; position:absolute; bottom:calc(100% + 4px); left:50%; transform:translateX(-50%);
        border:5px solid transparent; border-top-color:var(--ink); opacity:0; transition:opacity .12s; z-index:60; }
.tip:hover::after { opacity:1; transform:translateX(-50%) translateY(0); }
.tip:hover::before { opacity:1; }
.btn.warn { background:#c2843f; color:#fff; border-color:#c2843f; font-weight:700; }
.btn.warn:hover { background:var(--accent-l); }
/* parser suggestion at a proposal arc's midpoint. Only the % SCORE is circled; the
   X→Y pill (above) and the accept/reject buttons (below) sit OUTSIDE the circle. */
.prop-chip { position:absolute; transform:translate(-50%,-50%); z-index:9;
        display:flex; flex-direction:column; align-items:center; gap:6px;
        background:transparent; border:none; box-shadow:none; padding:0; }
/* below-cutoff (but RFC-valid) candidate → faded & shrunk; full opacity on hover */
.prop-chip.faint { opacity:.42; transform:translate(-50%,-50%) scale(.82); transition:opacity .12s, transform .12s; }
.prop-chip.faint:hover { opacity:1; transform:translate(-50%,-50%) scale(1); z-index:17; }
/* off-screen proposal pinned to the viewport edge.
   COMPACT (default): a solid pill FILLED with the score colour, showing only the X→Y
   link in white, with a little triangle tail pointing toward the off-screen proposal.
   EXPANDED (hover): the fill/border vanish, revealing the full proposal (link + % + ✓/✕). */
.prop-chip.pinned { background:var(--score-col, var(--accent)); border:1.6px solid var(--score-col, var(--accent));
        border-radius:999px; width:auto; height:auto; padding:5px 12px; gap:4px; flex-direction:row;
        box-shadow:0 6px 16px rgba(40,55,80,.26), 0 0 0 3px rgba(var(--accent-rgb),.10);
        transition:padding .12s; }
.prop-chip.pinned .pc-link { background:transparent; border:none; padding:0; }
.prop-chip.pinned:not(:hover) .pc-link, .prop-chip.pinned:not(:hover) .pc-link b { color:#fff !important; }
.prop-chip.pinned .pc-circle, .prop-chip.pinned .pc-acts { display:none; }
/* hover → expand: pill becomes transparent (no fill/border/tail), full content shown */
.prop-chip.pinned:hover { background:transparent; border:none; box-shadow:none;
        flex-direction:column; border-radius:0; padding:0; gap:6px; }
.prop-chip.pinned:hover .pc-link { padding:2px 11px; border:1.5px solid var(--border-0);
        border-radius:999px; background:var(--card); }
.prop-chip.pinned:hover .pc-circle, .prop-chip.pinned:hover .pc-acts { display:flex; }
.prop-chip.pinned:hover::before { display:none; }
/* solid triangle tail (compact only), score-coloured, pointing off-screen */
.prop-chip.pinned::before { content:""; position:absolute; width:0; height:0; z-index:20; border:11px solid transparent; }
.prop-chip.pinned.pin-left::before   { left:-25px;  top:50%; transform:translateY(-50%); border-right-color:var(--score-col, var(--accent)); }
.prop-chip.pinned.pin-right::before  { right:-25px; top:50%; transform:translateY(-50%); border-left-color:var(--score-col, var(--accent)); }
.prop-chip.pinned.pin-top::before    { top:-25px;  left:50%; transform:translateX(-50%); border-bottom-color:var(--score-col, var(--accent)); }
.prop-chip.pinned.pin-bottom::before { bottom:-25px; left:50%; transform:translateX(-50%); border-top-color:var(--score-col, var(--accent)); }
/* X→Y reference pill — outlined card pill; indices coloured by their speaker */
.pc-link { font-size:14px; font-weight:700; color:var(--fg-1); padding:2px 11px; white-space:nowrap;
        border:1.5px solid var(--border-0); border-radius:999px; background:var(--card);
        box-shadow:0 2px 6px rgba(40,55,80,.14); }
/* score badge — SOLID tinted disc (distinct from the dashed arc), score-coloured ring + text */
.pc-circle { display:flex; align-items:center; justify-content:center;
        font-size:17px; font-weight:800; letter-spacing:-.01em;
        background:hsl(0deg 0% 100% / 92%); border-radius:1em; padding:0.3em 0.7em; }
.pc-type { font-size:10.5px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.02em; }
/* accept/reject grouped in a rounded pill box (segmented control) */
.pc-acts { display:flex; gap:6px; padding:5px; background:var(--card); border:1px solid var(--hairline);
        border-radius:999px; box-shadow:0 3px 12px rgba(40,55,80,.20); }
.prop-chip button { width:22px; height:22px; border-radius:50%; cursor:pointer; border:none; color:#fff;
        font-size:12px; font-weight:900; line-height:1; display:flex; align-items:center; justify-content:center;
        transition:transform .1s, filter .1s; }
.prop-chip button:hover { transform:scale(1.08); filter:brightness(1.06); }
.prop-chip button:active { transform:scale(1); }
.pc-yes { background:#2e9e6b; }
.pc-no { background:#d9534f; }

/* explanation + controls callout, anchored beside the EDU under analysis */
.prop-callout { position:absolute; z-index:8; width:460px; max-width:52vw; background:var(--bg-1);
        border:1px solid var(--accent); border-left:4px solid var(--accent); border-radius:12px;
        box-shadow:0 10px 30px rgba(0,0,0,.45); padding:12px 14px; }
.prop-callout::before { content:""; position:absolute; left:-9px; top:22px; width:0; height:0;
        border-top:8px solid transparent; border-bottom:8px solid transparent; border-right:9px solid var(--accent); }
.pco-hdr { display:flex; align-items:center; gap:7px; font-size:12px; margin-bottom:8px; }
.pco-hdr .t { font-weight:700; color:var(--accent); }
.pco-via { font-size:10px; color:var(--fg-2); border:1px solid var(--border-1); border-radius:4px; padding:1px 6px; }
.pco-reason { font-size:13.5px; color:var(--fg-0); line-height:1.55; margin-bottom:10px;
        max-height:230px; overflow-y:auto; padding-right:4px; }
.pco-type { font-size:11px; color:#c4b5fd; margin-bottom:9px; }
.pco-type b { color:#a78bfa; text-transform:uppercase; }
.pco-row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.pco-row .btn { padding:5px 10px; font-size:12px; }
/* candidate explanation cards inside the callout */
.cand-card { border:1px solid var(--border-1); border-radius:8px; padding:7px 9px; margin-bottom:8px;
        background:var(--bg-2); }
.cand-hd { display:flex; align-items:center; gap:6px; font-size:12.5px; margin-bottom:4px; }
.cand-hd .btn { padding:3px 8px; font-size:11.5px; }
.cand-line { display:flex; align-items:flex-start; gap:6px; font-size:12.5px; line-height:1.45;
        color:var(--fg-0); margin-top:5px; }
.cand-tag { flex-shrink:0; font-size:9.5px; font-weight:800; letter-spacing:.03em; text-transform:uppercase;
        background:#0b3b2e; color:#6ee7b7; border-radius:4px; padding:2px 6px; }
.cand-tag.rel { background:#2a1d4d; color:#c4b5fd; }
.cand-line .conf { flex-shrink:0; font-size:11px; font-weight:800; color:var(--accent-l); min-width:34px; }
.cand-txt { color:var(--fg-1); }
.cand-contr { font-size:11.5px; color:var(--fg-2); margin-top:5px; line-height:1.45; }
.cand-contr b { color:#c4b5fd; }
/* explain (ⓘ) chip button — neutral */
.pc-exp { background:var(--bg-3); color:var(--accent-l); }
.pc-exp:hover { background:var(--border-1); }

/* Horizontal row: threads drawer (left) + canvas (right). Sits above the bottom panel. */
.body-row { flex:1; min-height:0; display:flex; flex-direction:row; overflow:hidden; position:relative; }
/* overlay layer that spans the dialogue list + canvas; draws the current arc as an arrow
   from the source row into the canvas. Clicks pass through. */
.xarc-layer { position:absolute; inset:0; width:100%; height:100%; pointer-events:none;
        overflow:visible; z-index:25; }

/* ── Parallel-threads drawer (left, resizable, collapsible) ─────────────── */
.threads-drawer { position:relative; flex-shrink:0; background:var(--bg-1);
        border-left:1px solid var(--hairline); display:flex; flex-direction:column; overflow:hidden; }
.thr-hdr { height:40px; flex-shrink:0; background:var(--bg-1); border-bottom:1px solid var(--hairline);
        display:flex; align-items:center; gap:8px; padding:0 6px 0 13px;
        font-size:11.5px; color:var(--fg-2); text-transform:uppercase; letter-spacing:.06em; }
.thr-hdr .title { color:var(--fg-1); font-weight:700; }
/* lanes stacked one BELOW the other = parallel discourse flows */
.thr-body { flex:1; overflow-y:auto; padding:8px; display:flex; flex-direction:column; gap:8px; }
.thr-empty { color:var(--fg-2); font-size:13px; padding:14px 8px; line-height:1.6; }
.thr-lane { border:1px solid var(--border-1); border-left:4px solid var(--tc,var(--accent));
        border-radius:8px; background:var(--bg-2); overflow:hidden; }
.thr-lane-hdr { display:flex; align-items:center; gap:7px; padding:7px 10px; font-size:12.5px;
        font-weight:700; color:var(--fg-0); border-bottom:1px solid var(--border-1); }
.thr-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.thr-count { margin-left:auto; color:var(--fg-2); font-weight:600; font-size:11px; }
/* the flow within a thread: chips in dialogue order, each EDU below the previous */
.thr-chips { display:flex; flex-direction:column; gap:5px; padding:7px 8px; }
.thr-chip { font-size:13px; line-height:1.45; color:var(--fg-1); cursor:pointer;
        border:1px solid var(--border-1); border-left:3px solid var(--tc,var(--accent));
        border-radius:6px; padding:4px 7px; background:var(--bg-1);
        overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.thr-chip:hover { background:var(--bg-3); }
.thr-chip.sel { border-color:var(--accent); box-shadow:0 0 0 1px rgba(var(--accent-rgb),.4); }

const SHORT_REL = {
  "QAP":"QAP", "Question_answer_pair":"QAP",

  "Q-Elab":"Q-Elab", "Comment":"Comm", "Contrast":"Contr",

  "Result":"Res", "Explanation":"Expl", "Narration":"Narr",
  "Background":"Bg", "Conditional":"Cond",
  "Clarification_Q":"Clar?",
};
const shortRel = r => SHORT_REL[r] || (r && r.length > 6 ? r.slice(0,5)+"…" : r || "");

// Soft/muted (dusty pastel, NOT neon) yet dark enough for readable labels on the

// hues) so CONSECUTIVE relations land far apart on the wheel — no near-duplicate
// blues/greens. Alternating lightness adds extra separation between similar hues.
const REL_PALETTE = Array.from({ length: 20 }, (_, i) =>
  `hsl(${(i * 140) % 360}, 33%, ${i % 2 ? 56 : 47}%)`);

// #26 — SDRT relation definitions, keyed by a normalized relation name. Sourced

const _rk = r => String(r || "").toLowerCase().replace(/[^a-z]/g, "");

// relation always gets the SAME color (e.g. gold "Question-answer_pair" == menu "QAP").
const REL_ALIAS = {
  questionanswerpair:"qap", questionanswer:"qap", qa:"qap",
  questionelaboration:"qelab", qelaboration:"qelab",
  clarificationquestion:"clarificationq", clarification:"clarificationq",
  confirmationquestion:"confirmationq", confirmation:"confirmationq",
  acknowledgment:"acknowledgement",
};
const relCanonRk = r => { const k = _rk(r); return REL_ALIAS[k] || k; };
// Full human-readable relation names (display only; stored value stays the config name).

  qap:"Question-Answer", qelab:"Question-Elaboration",
  clarificationq:"Clarification-Question", confirmationq:"Confirmation-Question",
  acknowledgement:"Acknowledgment", comment:"Comment", elaboration:"Elaboration",

// Ambiguity of a softmax score set: small top1−top2 MARGIN ⇒ the small model is unsure
// (two close candidates) ⇒ worth escalating to the big model. Returns {margin, top1, top2}.
function scoreMargin(scores) {
  const s = [...scores].filter(v => v != null).sort((a, b) => b - a);
  return { margin: s.length >= 2 ? s[0] - s[1] : (s.length ? 1 : 0), top1: s[0] || 0, top2: s[1] || 0 };
}
// Automatic statistical cutoff for parser link suggestions. DDPE /ddpe/score returns
// softmax-normalised scores (≈sum 1), so we (1) find the largest GAP in the sorted
// scores — the "elbow" separating a confident cluster from the tail — and keep down to
// it, and (2) never keep candidates BELOW the uniform/chance baseline (1/N). Returns the
// min score to keep. Robust to flat distributions (keeps the top) and peaked ones (keeps few).
// Statistical auto-cutoff for the link suggestions. The naive "largest-gap elbow" keeps
// only ONE parent whenever the top score dominates — wrong for MULTIPLE valid parents
// (a unit that legitimately attaches to several). We combine three signals:
//   • RELATIVE floor — keep every parent within REL of the best (captures answer clusters)
//   • NOISE floor    — an absolute minimum, so weak parents never pass
//   • ELBOW          — the largest-gap score is an UPPER bound (don't keep across a cliff)
// Returns the score threshold; links with score >= cut are the prominent suggestions.
function autoCutoff(scores) {
  const s = [...scores].filter(v => v != null).sort((a, b) => b - a);
  const n = s.length;
  if (n <= 1) return 0;
  const top = s[0];
  if (top <= 0) return 0;
  const NOISE = 0.12;     // absolute noise floor
  const REL   = 0.55;     // a second/third answer must be ≥ 55% of the best to count
  let gapAt = 0, gapSize = -1;
  for (let i = 0; i < n - 1; i++) { const g = s[i] - s[i + 1]; if (g > gapSize) { gapSize = g; gapAt = i; } }
  const elbow = s[gapAt];
  // inclusive cluster floor, but never above the elbow nor below the noise floor
  const cut = Math.max(NOISE, Math.min(elbow, Math.max(REL * top, NOISE)));
  return cut - 1e-6;
}
// Relation scores for display: keep the adaptive cutoff (elbow), but NORMALISE so the
// above-cutoff cluster reads as confident (> 50) and the tail < 50. Piecewise-linear,
// monotonic (preserves the original ranking): cutoff → 50, top → ~99, 0 → 0.
function normRelScores(rels) {
  const sorted = [...rels].sort((a, b) => (b.score || 0) - (a.score || 0));
  const raw = sorted.map(s => s.score || 0);
  const cut = autoCutoff(raw);
  const max = raw[0] || 1;
  const norm = sorted.map(s => {
    const v = s.score || 0;
    const d = v >= cut
      ? (max > cut ? 0.55 + 0.44 * (v - cut) / (max - cut) : 0.95)   // above → 55..99
      : (cut > 0 ? 0.48 * (v / cut) : 0);                            // below → 0..48
    return { relation: s.relation, score: d };
  });
  return { relations: norm, cut: 0.5 };   // threshold in the normalised space
}
// Runtime theming: derive lighter/darker shades + "r,g,b" from a hex primary so
// the whole UI re-themes in real time when the user picks a new main colour.
const _hex2rgb = h => { h = String(h).replace("#",""); if (h.length === 3) h = h.split("").map(c=>c+c).join(""); const n = parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255]; };
const shade = (hex, pct) => { const [r,g,b] = _hex2rgb(hex); const f = pct/100; const m = c => Math.max(0, Math.min(255, f>=0 ? Math.round(c+(255-c)*f) : Math.round(c*(1+f)))); return `#${((1<<24)+(m(r)<<16)+(m(g)<<8)+m(b)).toString(16).slice(1)}`; };
const hexRgb = hex => _hex2rgb(hex).join(",");
const _hexHsl = hex => { let [r,g,b] = _hex2rgb(hex).map(v => v/255); const mx = Math.max(r,g,b), mn = Math.min(r,g,b), d = mx - mn; let h = 0, s = 0, l = (mx+mn)/2; if (d) { s = l>.5 ? d/(2-mx-mn) : d/(mx+mn); h = mx===r ? ((g-b)/d+(g<b?6:0)) : mx===g ? ((b-r)/d+2) : ((r-g)/d+4); h *= 60; } return [Math.round(h), Math.round(s*100), Math.round(l*100)]; };
// Whole-palette derivation: tint EVERY token with the PRIMARY. Background SATURATION
// tracks the primary's saturation (vivid primary → more colourful UI, muted → subtle),
// and panel lightness sits a touch lower so --bg-1 reads as a real surface, not near-white.
function derivePalette(hex, light) {
  const [H, S0] = _hexHsl(hex);
  if (light) {
    const s = Math.min(72, Math.max(18, Math.round(S0 * 0.72)));   // bg saturation ∝ primary chroma
    const c = (mul, l) => `hsl(${H} ${Math.round(s*mul)}% ${l}%)`;
    return {
      "--bg-0": c(0.7, 98.5), "--bg-1": c(1.0, 93), "--bg-2": c(1.0, 88.5), "--bg-3": c(1.08, 83),
      "--border-0": c(0.85, 76), "--border-1": c(1.0, 90), "--hairline": c(0.8, 84),
      "--grid": c(0.8, 91), "--row-sel": c(1.4, 89), "--row-sug": c(1.0, 94),
      "--fg-0": c(0.5, 21), "--fg-1": c(0.35, 41), "--fg-2": c(0.28, 57), "--fg-3": c(0.22, 71),
      "--node-fg": c(0.5, 17), "--ink": c(0.5, 19), "--card": "#ffffff",
    };
  }
  const s = Math.min(60, Math.max(14, Math.round(S0 * 0.6)));
  const c = (mul, l) => `hsl(${H} ${Math.round(s*mul)}% ${l}%)`;
  return {
    "--bg-0": c(0.9, 7), "--bg-1": c(1.0, 11), "--bg-2": c(1.0, 9), "--bg-3": c(1.0, 14),
    "--border-0": c(1.0, 27), "--border-1": c(1.0, 18), "--hairline": c(1.0, 20),
    "--grid": c(1.0, 12), "--row-sel": c(1.4, 22), "--row-sug": c(1.0, 16),
    "--fg-0": c(0.4, 90), "--fg-1": c(0.3, 66), "--fg-2": c(0.25, 48), "--fg-3": c(0.2, 36),
    "--node-fg": c(0.4, 94), "--ink": c(0.4, 90), "--card": c(1.0, 14),
  };
}

// S7 — System Usability Scale (standard 10 items; odd positive, even negative).
// NASA-TLX: 6 sub-scales + the 15 pairwise comparisons used to WEIGHT them.
const TLX_DIMS = [
  ["mental", "Mental demand"], ["physical", "Physical demand"], ["temporal", "Temporal demand"],
  ["performance", "Performance"], ["effort", "Effort"], ["frustration", "Frustration"],
];
const TLX_PAIRS = (() => { const p = []; for (let i = 0; i < TLX_DIMS.length; i++)
  for (let j = i + 1; j < TLX_DIMS.length; j++) p.push([TLX_DIMS[i][0], TLX_DIMS[j][0]]); return p; })();
const TLX_LABEL = Object.fromEntries(TLX_DIMS);
// weighted NASA-TLX: weight_d = #times d won the pairwise comparisons (0..5, Σ=15);
// score = Σ(rating_d · weight_d) / 15. Returns {weights, score, complete}.
function tlxWeighted(tlx, pairs) {
  const w = Object.fromEntries(TLX_DIMS.map(([k]) => [k, 0]));
  let chosen = 0;
  TLX_PAIRS.forEach(([a, b]) => { const c = pairs?.[`${a}|${b}`]; if (c === a || c === b) { w[c]++; chosen++; } });
  const score = chosen ? TLX_DIMS.reduce((s, [k]) => s + (tlx[k] || 0) * w[k], 0) / 15 : null;
  return { weights: w, score: score != null ? Math.round(score * 10) / 10 : null, complete: chosen === 15 };
}

const NODE_W = 300, NODE_H = 120;

function scoreCls(s) {

async function api(path, opts = {}) {
  // always send the session cookie (works same-origin and over the https/ngrok tunnel)
  const r = await fetch(path, { credentials: "include", ...opts });
  if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
  return r.json();
}

// Layouts
function layoutLinear(n) {
  const pos = {};
  const BASE_X = 560;  // centred-ish column; canvas-wrap will scroll to it
  for (let i = 0; i < n; i++) pos[i] = { x: BASE_X, y: 30 + i * (NODE_H + 30) };
  return pos;
}
// #27 — incremental layout, ORIENTATION-AWARE (final coords, no transpose needed).
// Nodes sit linearly along the timeline axis (X when horizontal, Y when vertical);
// the cross axis is given a deterministic spread, then a barycenter pass pulls each
// child toward its parents' lane — minimising crossings and producing a VISIBLE
// re-arrangement every time an arc is added. `spacing` is the EDU gap (UI slider).
// #27 — COMBO incremental layout: nodes DO move off the axis AND arcs don't cross.
// The two strategies cooperate via the shared 2-page side assignment (computeArcSides):
//  • arcs bow to their assigned `side` (arcBow) → interleaving arcs go opposite sides → no crossings;
//  • a node SPANNED by an arc is pushed to the OPPOSITE side of that arc's bow → reveals
//    structure AND clears the arc (no arc-over-node overlap);
//  • endpoints / unconnected EDUs feel no span force → stay on the axis (no needless move);
//  • node-box overlap is resolved, and the barycentre is recentred onto the axis.
// ── ArcView: compact SVG arc canvas for admin compare panel ──────────────
function ArcView({ edus, arcs, title, relColorMap, maxH }) {
  const NODE_W2 = 260, NODE_H2 = 58, GAP2 = 10, MARGIN2 = 14;
  const ARC_X = NODE_W2 + 20;  // arcs start to the right of nodes
  const n = (edus || []).length;
  const totalH = MARGIN2 * 2 + n * NODE_H2 + (n - 1) * GAP2;
  const nodeY = i => MARGIN2 + i * (NODE_H2 + GAP2);
  const nodeCY = i => nodeY(i) + NODE_H2 / 2;

  // Assign arc offsets so they don't overlap
  const sorted = [...(arcs || [])].sort((a, b) => Math.abs(b.y - b.x) - Math.abs(a.y - a.x));
  const offMap = {};
  sorted.forEach((a, idx) => { offMap[`${a.x},${a.y}`] = 50 + idx * 28; });

  const svgW = ARC_X + (sorted.length ? 50 + sorted.length * 28 + 40 : 60);

  return (
    <div className="admin-arcview">
      <div className="admin-arcview-hdr">
        <span>{title}</span>
        <span style={{fontWeight:400, color:"var(--fg-2)", fontSize:11}}>{(arcs||[]).length} arcs</span>
      </div>
      <div className="admin-arcview-body" style={{maxHeight: maxH || 400}}>
        <svg width={svgW} height={totalH} style={{display:"block", minWidth:svgW}}>
          <defs>
            <marker id="adm-arrow" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
              <path d="M0,0 L7,3.5 L0,7 Z" fill="#6f86b3"/>
            </marker>
            {(relColorMap ? Object.entries(relColorMap) : []).map(([rel, col]) => (
              <marker key={rel} id={`adm-arr-${rel.replace(/[^a-zA-Z0-9]/g,"_")}`}
                      markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
                <path d="M0,0 L7,3.5 L0,7 Z" fill={col}/>
              </marker>
            ))}
          </defs>
          {/* EDU nodes */}
          {(edus || []).map((edu, i) => {
            const y = nodeY(i);
            return (
              <g key={i}>
                <rect x={2} y={y} width={NODE_W2} height={NODE_H2} rx={6}
                      fill="var(--bg-1)" stroke="var(--border-0)" strokeWidth={1}/>
                <text x={10} y={y + 13} fontSize={10} fontWeight="bold" fill="var(--accent)">
                  {`[${i}]`}
                </text>
                <foreignObject x={10} y={y + 16} width={NODE_W2 - 14} height={NODE_H2 - 20}>
                  <div xmlns="http://www.w3.org/1999/xhtml"
                       style={{fontSize:11, lineHeight:"1.3", overflow:"hidden",
                               display:"-webkit-box", WebkitLineClamp:2,
                               WebkitBoxOrient:"vertical", color:"var(--fg-1)"}}>
                    {edu}
                  </div>
                </foreignObject>
              </g>
            );
          })}
          {/* Arcs */}
          {(arcs || []).map((arc, ai) => {
            const lo = Math.min(arc.x, arc.y), hi = Math.max(arc.x, arc.y);
            const off = offMap[`${arc.x},${arc.y}`] || 50;
            const y1 = nodeCY(lo), y2 = nodeCY(hi);
            const mx = ARC_X + off, my = (y1 + y2) / 2;
            const col = (relColorMap && relColorMap[arc.type]) || "#6f86b3";
            const markId = (relColorMap && relColorMap[arc.type])
              ? `adm-arr-${arc.type.replace(/[^a-zA-Z0-9]/g,"_")}`
              : "adm-arrow";
            const d = `M ${ARC_X} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${ARC_X} ${y2}`;
            const lx = mx + 4, ly = (y1 + y2) / 2;
            return (
              <g key={ai}>
                <path d={d} stroke={col} strokeWidth={1.5} fill="none"
                      markerEnd={`url(#${markId})`}/>
                {arc.type ? (
                  <text x={lx} y={ly} fontSize={9} fill={col}
                        dominantBaseline="middle" textAnchor="start"
                        style={{pointerEvents:"none"}}>
                    {arc.type}
                  </text>
                ) : null}
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

// player's position, and click-to-seeks. Degrades to nothing if peaks are absent.

  const canvasRef = useRef(null);

  useEffect(() => {
    if (!peaksUrl) { setPeaks(null); return; }
    let alive = true;
    fetch(peaksUrl).then(r => r.json()).then(d => { if (alive) setPeaks(d); })
      .catch(() => { if (alive) setPeaks(null); });

  // Follow the player's clock for the moving playhead.
  useEffect(() => {
    let raf;
    const tick = () => {
      const m = mediaRef.current;
      if (m && !Number.isNaN(m.currentTime)) setPlayT(m.currentTime);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [mediaRef]);

  useEffect(() => {
    const cv = canvasRef.current;
    if (!cv || !peaks) return;

      const x1 = ((sc[1] != null ? Number(sc[1]) : dur) / dur) * W;

                       borderRadius: 4, background: "var(--bg-1)",

             onClick={() => { const m = mediaRef.current; if (m) { try { m.currentTime = f.t; m.play().catch(() => {}); } catch (e) {} } }}
             style={{ height: 44, borderRadius: 3, cursor: "pointer", flex: "0 0 auto",

// EduClip: plays ONE EDU's own media segment (its MELD per-utterance clip). Video
// (audio+picture) when the clip is a video file, else audio. Autoplays when the
// selected EDU changes; `key={src}` remounts on change for a clean reload.
function EduClip({ edu, idx, accent = "#38bdf8" }) {
  const ref = useRef(null);
  const src = edu?.clip_src;
  const isVideo = edu?.clip_type === "video";
  useEffect(() => {
    const m = ref.current;
    if (m && src) { try { m.play().catch(() => {}); } catch (e) {} }
  }, [src]);
  if (!src) return null;
  return (
    <div style={{ marginBottom: 8 }}>
      <div style={{ fontSize: 9, fontWeight: 700, textTransform: "uppercase",
                    letterSpacing: ".05em", color: accent, marginBottom: 3 }}>
        ▶ EDU {idx} · {edu.clip_type} segment
      </div>
      {isVideo
        ? <video key={src} ref={ref} src={src} controls autoPlay playsInline
                 style={{ width: "100%", borderRadius: 6, background: "#000", maxHeight: 240 }} />
        : <audio key={src} ref={ref} src={src} controls autoPlay style={{ width: "100%" }} />}
    </div>
  );
}

// DatasetPicker: one faceted popover with a uniform hierarchy —
// pick LANGUAGE → FORMALISM → DATASET. DISRPT corpora are named lang.formalism.corpus;
// the native SDRT datasets (stac, molweni, …) are folded into the same tree via NATIVE_META.
function DatasetPicker({ config, dataset, onPick }) {
  const [open, setOpen] = useState(false);
  const [lang, setLang] = useState(null);
  const [fmk, setFmk] = useState(null);
  const names = (config?.datasets || []).map(d => d.name);
  const isDisrpt = n => /^[a-z]{3}\.[^.]+\..+/.test(n);
  // language + formalism for the non-DISRPT native datasets (not named lang.fmk.corpus)
  const NATIVE_META = {
    stac: ["eng", "sdrt"], stac_full: ["eng", "sdrt"], molweni: ["eng", "sdrt"],
    draddp: ["eng", "sdrt"], draddp_demo: ["eng", "sdrt"], moddp: ["zho", "sdrt"],
  };
  const NORM_FMK = { erst: "rst" };   // uniform: enhanced-RST grouped under RST
  const meta = n => {
    const [lg, fm] = isDisrpt(n) ? n.split(".").slice(0, 2) : (NATIVE_META[n] || ["other", "other"]);
    return [lg, NORM_FMK[fm] || fm];
  };
  const label = n => isDisrpt(n) ? n.split(".").slice(2).join(".") : n;  // dataset display name
  // unified tree: language -> formalism -> [dataset names]
  const tree = {};
  names.forEach(n => {
    const [lg, fm] = meta(n);
    tree[lg] = tree[lg] || {};
    (tree[lg][fm] = tree[lg][fm] || []).push(n);
  });
  // dedup: within a bucket, if two datasets share the same display label (e.g. native
  // `stac` and DISRPT `eng.sdrt.stac`) keep only the native one.
  Object.values(tree).forEach(fmObj => Object.keys(fmObj).forEach(fm => {
    const seen = {};
    fmObj[fm].forEach(n => {
      const key = label(n);
      if (!(key in seen) || (!isDisrpt(n) && isDisrpt(seen[key]))) seen[key] = n;
    });
    fmObj[fm] = Object.values(seen);
  }));
  const langs = Object.keys(tree).sort();
  const openPanel = () => {
    const [lg, fm] = meta(dataset);
    setLang(lg); setFmk(fm); setOpen(true);
  };
  const curLang = (lang && tree[lang]) ? lang : langs[0];
  const fmks = curLang ? Object.keys(tree[curLang] || {}).sort() : [];
  const curFmk = (fmk && fmks.includes(fmk)) ? fmk : fmks[0];
  const corpora = (curLang && curFmk) ? [...(tree[curLang][curFmk] || [])].sort() : [];
  const pick = n => { onPick(n); setOpen(false); };
  const Chip = ({ active, onClick, children }) => (
    <button className={"ds-chip" + (active ? " on" : "")} onClick={onClick}>{children}</button>
  );
  return (
    <div style={{ position: "relative", display: "inline-block" }}>
      <button className="ds-trigger" onClick={openPanel} title="choose dataset">
        <span className="dot"></span>{dataset}<span className="caret">▾</span>
      </button>
      {open && <>
        <div onClick={() => setOpen(false)} style={{ position: "fixed", inset: 0, zIndex: 40 }} />
        <div className="ds-pop">
          <div className="ds-sec"><b>language</b></div>
          <div className="ds-grid">{langs.map(l =>
            <Chip key={l} active={l === curLang} onClick={() => { setLang(l); setFmk(null); }}>{l}</Chip>)}</div>
          <div className="ds-div"></div>
          <div className="ds-sec"><b>formalism</b></div>
          <div className="ds-grid">{fmks.map(f =>
            <Chip key={f} active={f === curFmk} onClick={() => { setFmk(f); }}>{f}</Chip>)}</div>
          <div className="ds-div"></div>
          <div className="ds-sec">dataset · <b>{curLang}.{curFmk}</b></div>
          <div className="ds-grid">{corpora.map(n =>
            <Chip key={n} active={n === dataset} onClick={() => pick(n)}>{label(n)}</Chip>)}</div>
          {(() => {   // provenance: the current dataset's source publication
            const p = (config?.datasets || []).find(d => d.name === dataset)?.paper;
            if (!p) return null;
            const ref = (r) => r.url
              ? <a href={r.url} target="_blank" rel="noreferrer" title={r.title}
                   style={{ color: "var(--accent)" }}>{r.short}</a>
              : <span title={r.title}>{r.short}</span>;
            return (
              <div style={{ marginTop: 11, paddingTop: 9, borderTop: "1px solid var(--border-1)",
                            fontSize: 11.5, color: "var(--fg-2)", lineHeight: 1.5 }}>
                <span style={{ fontWeight: 700, color: "var(--fg-1)" }}>Source: </span>
                {ref(p)}{p.venue ? <span> · {p.venue}</span> : null}
                {p.also ? <span> · also {ref(p.also)}</span> : null}
                <div style={{ color: "var(--fg-3)", marginTop: 2 }}>{p.title}</div>
              </div>
            );
          })()}
        </div>
      </>}
    </div>
  );
}

    try {

          nasa_tlx: isTlx ? quiz.tlx : null, nasa_tlx_pairs: isTlx ? quiz.tlxPairs : null,
          nasa_tlx_weights: tlxW.weights, nasa_tlx_weighted: tlxW.score,

          llm: { ...llmStatsRef.current },

      setQuiz(null);
